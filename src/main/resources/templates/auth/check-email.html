<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiểm Tra Email - PetShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .check-email-card {
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        overflow: hidden;
      }
      .check-email-header {
        background: linear-gradient(135deg, #38ef7d, #11998e);
        padding: 2rem;
        text-align: center;
      }
      .icon-header {
        width: 64px;
        height: 64px;
        stroke: white;
        margin: 0 auto 1rem;
      }
      .icon-sm {
        width: 16px;
        height: 16px;
        vertical-align: -2px;
      }
      .btn-resend {
        background: linear-gradient(135deg, #38ef7d, #11998e);
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      .btn-resend:hover {
        opacity: 0.9;
        color: white;
      }
      .btn-secondary {
        border-radius: 8px;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
      }
      .email-info {
        background: #f8f9fa;
        border-left: 4px solid #38ef7d;
        padding: 1rem;
        border-radius: 8px;
        margin: 1.5rem 0;
      }
      .email-address {
        font-weight: 600;
        color: #11998e;
      }
      .alert-autohide {
        position: relative;
        overflow: hidden;
      }
      .alert-autohide::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.6);
        animation: shrink 5s linear forwards;
      }
      @keyframes shrink {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }
      .text-muted-custom {
        color: #6c757d;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="card check-email-card border-0">
            <!-- Header -->
            <div class="check-email-header text-white">
              <i data-lucide="mail-check" class="icon-header d-block"></i>
              <h3 class="mb-1 fw-bold">Kiểm tra Email</h3>
              <p class="mb-0 opacity-75">Xác nhận địa chỉ email của bạn</p>
            </div>

            <!-- Form -->
            <div class="card-body p-4">
              <!-- Thông báo lỗi -->
              <div
                th:if="${errorMsg}"
                class="alert alert-danger rounded-3 py-2"
              >
                <small>
                  <i
                    data-lucide="triangle-alert"
                    class="icon-sm text-danger me-1"
                  ></i>
                  <span th:text="${errorMsg}"></span>
                </small>
              </div>

              <!-- Thông báo thành công (tự mất sau 5s) -->
              <div
                th:if="${successMsg}"
                id="successAlert"
                class="alert alert-success rounded-3 py-2 alert-autohide"
              >
                <small>
                  <i
                    data-lucide="circle-check"
                    class="icon-sm text-success me-1"
                  ></i>
                  <span th:text="${successMsg}"></span>
                </small>
              </div>

              <!-- Email info -->
              <div class="email-info">
                <p class="mb-0 text-muted-custom">Email của bạn:</p>
                <p class="mb-0 email-address" th:text="${email}"></p>
              </div>

              <!-- Instructions -->
              <p class="text-muted-custom text-center mb-4">
                Chúng tôi đã gửi email xác nhận đến địa chỉ email của bạn. Vui
                lòng nhấp vào liên kết trong email để xác nhận tài khoản.
              </p>

              <!-- Resend button -->
              <form
                id="resendForm"
                th:action="@{/auth/resend-verification-email}"
                method="get"
              >
                <input type="hidden" name="email" th:value="${email}" />
                <button
                  type="submit"
                  class="btn btn-resend w-100 text-white mb-2"
                >
                  <i
                    data-lucide="mail"
                    class="icon-sm"
                    style="vertical-align: -2px; margin-right: 6px"
                  ></i>
                  Gửi lại Email
                </button>
              </form>

              <!-- Divider -->
              <hr class="my-3" />

              <!-- Back to login -->
              <p class="text-center mb-0">
                <a
                  th:href="@{/auth/login}"
                  class="text-muted small d-inline-flex align-items-center gap-1"
                >
                  <i data-lucide="arrow-left" class="icon-sm"></i>
                  Quay lại đăng nhập
                </a>
              </p>
              <p class="text-center mt-2 mb-0">
                <a
                  th:href="@{/}"
                  class="text-muted small d-inline-flex align-items-center gap-1"
                >
                  <i data-lucide="home" class="icon-sm"></i>
                  Về trang chủ
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Initialize Lucide icons -->
    <script>
      lucide.createIcons({
        nameAttributes: ["data-lucide"],
      });

      // Auto-hide success alert after 5 seconds
      var successAlert = document.getElementById("successAlert");
      if (successAlert) {
        setTimeout(function () {
          successAlert.style.display = "none";
        }, 5000);
      }
    </script>
  </body>
</html>
