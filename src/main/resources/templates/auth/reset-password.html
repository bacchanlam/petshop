<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lại Mật khẩu - PetShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .card {
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }
      .header {
        background: linear-gradient(135deg, #28a745, #20c997);
        padding: 2rem;
        text-align: center;
      }
      .icon-header {
        width: 48px;
        height: 48px;
        stroke: white;
      }
      .icon-sm {
        width: 16px;
        height: 16px;
        vertical-align: -2px;
      }
      .icon-eye {
        width: 18px;
        height: 18px;
      }
      .btn-action {
        border-radius: 8px;
        padding: 12px 24px;
        font-weight: 600;
      }
      .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 2px solid #e9ecef;
      }
      .form-control:focus {
        border-color: #28a745;
        box-shadow: none;
      }

      /* Input group styling */
      .input-group .form-control {
        border-right: none;
        border-radius: 8px 0 0 8px !important;
      }
      .input-group .btn-outline-secondary {
        border: 2px solid #e9ecef;
        border-left: none;
        border-radius: 0 8px 8px 0 !important;
        background: white !important;
        color: #6c757d !important;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .input-group .btn-outline-secondary:hover {
        color: #28a745 !important;
      }
      .input-group:focus-within .form-control,
      .input-group:focus-within .btn-outline-secondary {
        border-color: #28a745;
      }
      .input-group:focus-within .form-control {
        box-shadow: none;
      }

      /* Ẩn icon mắt mặc định */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
        display: none !important;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="card">
            <!-- Header -->
            <div class="header text-white">
              <div class="mb-2 d-flex justify-content-center">
                <i data-lucide="shield-check" class="icon-header"></i>
              </div>
              <h3 class="mb-0 fw-bold">Đặt lại Mật khẩu</h3>
              <p class="mb-0 opacity-75">
                Nhập mật khẩu mới cho tài khoản của bạn
              </p>
            </div>

            <!-- Form -->
            <div class="card-body p-4">
              <!-- Thông báo lỗi -->
              <div
                th:if="${errorMsg}"
                class="alert alert-danger rounded-3 py-2 mb-3"
              >
                <small>
                  <i
                    data-lucide="triangle-alert"
                    class="icon-sm text-danger me-1"
                  ></i>
                  <span th:text="${errorMsg}"></span>
                </small>
              </div>

              <!-- Form -->
              <form th:action="@{/auth/reset-password}" method="post">
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <input type="hidden" name="token" th:value="${token}" />

                <!-- Mật khẩu mới -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Mật khẩu mới</label>
                  <div class="input-group">
                    <input
                      type="password"
                      name="newPassword"
                      id="newPasswordInput"
                      class="form-control"
                      placeholder="Nhập mật khẩu mới (6-100 ký tự)"
                      required
                    />
                    <button
                      type="button"
                      id="toggleNewPassword"
                      class="btn btn-outline-secondary"
                    >
                      <i
                        id="newPasswordIcon"
                        data-lucide="eye"
                        class="icon-eye"
                      ></i>
                    </button>
                  </div>
                </div>

                <!-- Xác nhận mật khẩu -->
                <div class="mb-3">
                  <label class="form-label fw-semibold"
                    >Xác nhận mật khẩu</label
                  >
                  <div class="input-group">
                    <input
                      type="password"
                      name="confirmPassword"
                      id="confirmPasswordInput"
                      class="form-control"
                      placeholder="Nhập lại mật khẩu mới"
                      required
                    />
                    <button
                      type="button"
                      id="toggleConfirmPassword"
                      class="btn btn-outline-secondary"
                    >
                      <i
                        id="confirmPasswordIcon"
                        data-lucide="eye"
                        class="icon-eye"
                      ></i>
                    </button>
                  </div>
                </div>

                <button type="submit" class="btn btn-success w-100 btn-action">
                  <i
                    data-lucide="check-circle"
                    class="icon-sm me-2"
                    style="display: inline-block; width: 16px; height: 16px"
                  ></i>
                  Đặt lại mật khẩu
                </button>
              </form>

              <hr class="my-3" />

              <!-- Link quay lại -->
              <div class="text-center">
                <p class="mb-0">
                  <a
                    th:href="@{/auth/login}"
                    class="text-muted small d-inline-flex align-items-center gap-1"
                  >
                    <i data-lucide="arrow-left" class="icon-sm"></i>
                    Quay lại đăng nhập
                  </a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      lucide.createIcons();

      // SVG cho eye icons
      const SVG_EYE = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      const SVG_EYE_OFF = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 8 11 8a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 8 11 8a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;

      // Toggle new password visibility
      document
        .getElementById("toggleNewPassword")
        .addEventListener("click", function () {
          const input = document.getElementById("newPasswordInput");
          const icon = document.getElementById("newPasswordIcon");
          const isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          icon.outerHTML = isHidden ? SVG_EYE_OFF : SVG_EYE;
          lucide.createIcons();
        });

      // Toggle confirm password visibility
      document
        .getElementById("toggleConfirmPassword")
        .addEventListener("click", function () {
          const input = document.getElementById("confirmPasswordInput");
          const icon = document.getElementById("confirmPasswordIcon");
          const isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          icon.outerHTML = isHidden ? SVG_EYE_OFF : SVG_EYE;
          lucide.createIcons();
        });
    </script>
  </body>
</html>
