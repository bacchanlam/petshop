<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - PetShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .login-card {
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }
      .login-header {
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        padding: 2rem;
        text-align: center;
      }
      .btn-login {
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      .btn-login:hover {
        opacity: 0.9;
      }
      .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 2px solid #e9ecef;
      }
      .form-control:focus {
        border-color: #0d6efd;
        box-shadow: none;
      }
      .form-control.is-invalid {
        border-color: #dc3545;
        background-image: none;
      }
      .form-control.is-invalid:focus {
        border-color: #dc3545;
      }

      /* Error message styling */
      .form-group {
        position: relative;
      }
      .invalid-feedback {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 4px;
        font-size: 13px;
        color: #dc3545;
        font-weight: 500;
        animation: slideInDown 0.3s ease;
        padding: 2px 4px;
      }
      .invalid-feedback.show {
        display: block;
      }
      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .input-group .invalid-feedback {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
      }

      /* Giữ nút mắt hiển thị khi input-group được focus */
      .input-group .form-control {
        border-right: none;
        border-radius: 8px 0 0 8px !important;
      }
      .input-group .btn-outline-secondary {
        border: 2px solid #e9ecef;
        border-left: none;
        border-radius: 0 8px 8px 0 !important;
        background: white !important;
        color: #6c757d !important;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .input-group .btn-outline-secondary:hover {
        color: #0d6efd !important;
      }
      .input-group:focus-within .form-control,
      .input-group:focus-within .btn-outline-secondary {
        border-color: #0d6efd;
      }
      .input-group:focus-within .form-control {
        box-shadow: none;
      }

      /* Tắt icon mắt mặc định của trình duyệt (Edge, IE, Chrome) */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
        display: none !important;
      }

      /* Lucide icon sizing helpers */
      .icon-header {
        width: 48px;
        height: 48px;
        stroke: white;
      }
      .icon-sm {
        width: 16px;
        height: 16px;
        vertical-align: -2px;
      }
      .icon-eye {
        width: 18px;
        height: 18px;
      }

      /* Auto-dismiss progress bar */
      .alert-autohide {
        position: relative;
        overflow: hidden;
      }
      .alert-autohide::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.6);
        animation: shrink 5s linear forwards;
      }
      @keyframes shrink {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }

      /* Footer links section styling */
      .footer-links {
        padding-top: 0.5rem;
      }

      /* "Chưa có tài khoản?" section */
      .signup-section {
        background: linear-gradient(135deg, rgba(13, 110, 253, 0.05), rgba(102, 126, 234, 0.05));
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 1rem;
        border-left: 3px solid #0d6efd;
      }

      .signup-section p {
        margin: 0;
        font-size: 0.95rem;
        color: #495057;
      }

      .signup-section a {
        text-decoration: none;
        color: #0d6efd;
        font-weight: 700;
        transition: all 0.3s ease;
      }

      .signup-section a:hover {
        color: #6610f2;
        text-decoration: underline;
      }

      /* Footer quick links */
      .footer-quick-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.5rem 0;
      }

      .footer-quick-links a {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.8rem;
        border-radius: 6px;
        font-size: 0.85rem;
        color: #6c757d;
        text-decoration: none;
        transition: all 0.3s ease;
        background: #f8f9fa;
        border: 1px solid transparent;
      }

      .footer-quick-links a:hover {
        background: #e9ecef;
        color: #0d6efd;
        border-color: #dee2e6;
        transform: translateY(-2px);
      }

      .footer-quick-links i {
        opacity: 0.8;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="card login-card border-0">
            <!-- Header -->
            <div class="login-header text-white">
              <div class="mb-2 d-flex justify-content-center">
                <i data-lucide="paw-print" class="icon-header"></i>
              </div>
              <h3 class="mb-0 fw-bold">PetShop</h3>
              <p class="mb-0 opacity-75">Chào mừng bạn trở lại!</p>
            </div>

            <!-- Form -->
            <div class="card-body p-4">
              <!-- Thông báo lỗi (hiển thị thường, không tự mất) -->
              <div
                th:if="${errorMsg}"
                class="alert alert-danger rounded-3 py-2"
              >
                <small>
                  <i
                    data-lucide="triangle-alert"
                    class="icon-sm text-danger me-1"
                  ></i>
                  <span th:text="${errorMsg}"></span>
                </small>
              </div>

              <!-- Thông báo thành công (tự mất sau 5s — dùng khi logout) -->
              <div
                th:if="${successMsg}"
                id="successAlert"
                class="alert alert-success rounded-3 py-2 alert-autohide"
              >
                <small>
                  <i
                    data-lucide="circle-check"
                    class="icon-sm text-success me-1"
                  ></i>
                  <span th:text="${successMsg}"></span>
                </small>
              </div>

              <!-- Form đăng nhập -->
              <form
                id="loginForm"
                th:action="@{/auth/login}"
                method="post"
                novalidate
              >
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />

                <div class="mb-4 form-group">
                  <label class="form-label fw-semibold">
                    Tên đăng nhập hoặc Email
                  </label>
                  <input
                    type="text"
                    name="username"
                    class="form-control"
                    id="usernameInput"
                    placeholder="Nhập username hoặc email"
                    required
                    autofocus
                  />
                  <div class="invalid-feedback" id="usernameError">
                    <i
                      data-lucide="alert-circle"
                      class="icon-sm"
                      style="
                        width: 14px;
                        height: 14px;
                        vertical-align: -2px;
                        margin-right: 4px;
                      "
                    ></i>
                    <span id="usernameErrorText"></span>
                  </div>
                </div>

                <div class="mb-4 form-group">
                  <label class="form-label fw-semibold">Mật khẩu</label>
                  <div class="input-group">
                    <input
                      type="password"
                      name="password"
                      id="passwordInput"
                      class="form-control"
                      placeholder="Nhập mật khẩu"
                      required
                    />
                    <button
                      class="btn btn-outline-secondary d-flex align-items-center px-3"
                      type="button"
                      id="toggleBtn"
                      title="Hiện/Ẩn mật khẩu"
                    >
                      <!-- SVG eye inline — không dùng data-lucide để tránh bị re-render mất nút -->
                      <svg
                        id="eyeIcon"
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"
                        />
                        <circle cx="12" cy="12" r="3" />
                      </svg>
                    </button>
                  </div>
                  <div class="invalid-feedback" id="passwordError">
                    <i
                      data-lucide="alert-circle"
                      class="icon-sm"
                      style="
                        width: 14px;
                        height: 14px;
                        vertical-align: -2px;
                        margin-right: 4px;
                      "
                    ></i>
                    <span id="passwordErrorText"></span>
                  </div>
                </div>

                <div
                  class="d-flex justify-content-between align-items-center mb-3"
                >
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      name="remember-me"
                      id="rememberMe"
                    />
                    <label class="form-check-label small" for="rememberMe">
                      Ghi nhớ đăng nhập
                    </label>
                  </div>
                </div>

                <button
                  type="submit"
                  class="btn btn-login btn-primary w-100 text-white d-flex align-items-center justify-content-center gap-2"
                >
                  <i data-lucide="log-in" class="icon-sm"></i>
                  Đăng Nhập
                </button>
              </form>

              <hr class="my-3" />

              <!-- Google OAuth2 Login -->
              <a
                th:href="@{/oauth2/authorization/google}"
                class="btn btn-light w-100 d-flex align-items-center justify-content-center gap-2 mb-3"
                style="
                  border: 2px solid #dee2e6;
                  border-radius: 8px;
                  padding: 12px;
                  font-weight: 500;
                "
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4"
                  />
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853"
                  />
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05"
                  />
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335"
                  />
                  <path d="M1 1h22v22H1z" fill="none" />
                </svg>
                Đăng nhập với Google
              </a>

              <hr class="my-3" />

              <!-- Signup Section -->
              <p class="text-center mb-0 small">
                Chưa có tài khoản?
                <a th:href="@{/auth/register}" class="text-primary fw-semibold">
                  Đăng ký ngay
                </a>
              </p>

              <!-- Quick Links -->
              <div class="footer-links">
                <div class="footer-quick-links text-center">
                  <a
                    th:href="@{/auth/forgot-password}"
                    class="d-inline-flex align-items-center gap-1"
                  >
                    <i data-lucide="key" class="icon-sm"></i>
                    <span>Quên mật khẩu</span>
                  </a>
                  <span style="color: #dee2e6;">|</span>
                  <a th:href="@{/}" class="d-inline-flex align-items-center gap-1">
                    <i data-lucide="home" class="icon-sm"></i>
                    <span>Trang chủ</span>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      lucide.createIcons();

      // SVG paths cho eye và eye-off
      const SVG_EYE = `
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
        <circle cx="12" cy="12" r="3"/>`;
      const SVG_EYE_OFF = `
        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
        <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
        <line x1="2" y1="2" x2="22" y2="22"/>`;

      document
        .getElementById("toggleBtn")
        .addEventListener("click", function () {
          const input = document.getElementById("passwordInput");
          const icon = document.getElementById("eyeIcon");
          const isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          icon.innerHTML = isHidden ? SVG_EYE_OFF : SVG_EYE;
        });

      // Tự động ẩn thông báo thành công sau 5 giây (dùng khi logout)
      const successAlert = document.getElementById("successAlert");
      if (successAlert) {
        setTimeout(() => {
          successAlert.style.transition =
            "opacity 0.5s ease, max-height 0.5s ease, padding 0.5s ease, margin 0.5s ease";
          successAlert.style.opacity = "0";
          successAlert.style.maxHeight = "0";
          successAlert.style.padding = "0";
          successAlert.style.margin = "0";
          setTimeout(() => successAlert.remove(), 500);
        }, 5000);
      }

      // Custom validation với thông báo tiếng Việt - hiển thị inline
      const loginForm = document.getElementById("loginForm");
      const usernameInput = document.getElementById("usernameInput");
      const passwordInput = document.getElementById("passwordInput");
      const usernameError = document.getElementById("usernameError");
      const passwordError = document.getElementById("passwordError");
      const usernameErrorText = document.getElementById("usernameErrorText");
      const passwordErrorText = document.getElementById("passwordErrorText");

      // Hàm hiển thị error
      function showError(input, errorDiv, errorTextSpan, message) {
        input.classList.add("is-invalid");
        errorTextSpan.textContent = message;
        errorDiv.classList.add("show");
        // Re-render icons nếu có lucide icons trong error message
        setTimeout(() => lucide.createIcons(), 0);
      }

      // Hàm ẩn error
      function hideError(input, errorDiv) {
        input.classList.remove("is-invalid");
        errorDiv.classList.remove("show");
      }

      loginForm.addEventListener("submit", function (e) {
        let isValid = true;

        // Kiểm tra username
        if (!usernameInput.value.trim()) {
          showError(
            usernameInput,
            usernameError,
            usernameErrorText,
            "Vui lòng nhập tên đăng nhập hoặc email",
          );
          isValid = false;
        } else {
          hideError(usernameInput, usernameError);
        }

        // Kiểm tra password
        if (!passwordInput.value.trim()) {
          showError(
            passwordInput,
            passwordError,
            passwordErrorText,
            "Vui lòng nhập mật khẩu",
          );
          isValid = false;
        } else {
          hideError(passwordInput, passwordError);
        }

        if (!isValid) {
          e.preventDefault();
          // Focus vào field lỗi đầu tiên
          if (!usernameInput.value.trim()) {
            usernameInput.focus();
          } else if (!passwordInput.value.trim()) {
            passwordInput.focus();
          }
        }
      });

      // Xoá error message khi user bắt đầu nhập
      usernameInput.addEventListener("input", function () {
        if (this.value.trim()) {
          hideError(this, usernameError);
        }
      });

      passwordInput.addEventListener("input", function () {
        if (this.value.trim()) {
          hideError(this, passwordError);
        }
      });

      // Xoá error khi focus vào field
      usernameInput.addEventListener("focus", function () {
        hideError(this, usernameError);
      });

      passwordInput.addEventListener("focus", function () {
        hideError(this, passwordError);
      });
    </script>
  </body>
</html>
