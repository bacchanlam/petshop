<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .login-card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            padding: 2rem;
            text-align: center;
        }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .form-control { border-radius: 8px; padding: 12px 15px; border: 2px solid #e9ecef; }
        .form-control:focus { border-color: #0d6efd; box-shadow: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card border-0">
                <!-- Header -->
                <div class="login-header text-white">
                    <div class="fs-1 mb-2">🐾</div>
                    <h3 class="mb-0 fw-bold">PetShop</h3>
                    <p class="mb-0 opacity-75">Chào mừng bạn trở lại!</p>
                </div>

                <!-- Form -->
                <div class="card-body p-4">
                    <!-- Thông báo lỗi -->
                    <div th:if="${errorMsg}" class="alert alert-danger rounded-3 py-2">
                        <small>⚠️ <span th:text="${errorMsg}"></span></small>
                    </div>
                    <!-- Thông báo thành công -->
                    <div th:if="${successMsg}" class="alert alert-success rounded-3 py-2">
                        <small>✅ <span th:text="${successMsg}"></span></small>
                    </div>

                    <!-- Form đăng nhập - action do Spring Security xử lý -->
                    <form th:action="@{/auth/login}" method="post">
                        <!-- CSRF Token (Spring Security tự inject) -->
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Tên đăng nhập hoặc Email
                            </label>
                            <input type="text" name="username" class="form-control"
                                   placeholder="Nhập username hoặc email" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <div class="input-group">
                                <input type="password" name="password" id="passwordInput"
                                       class="form-control" placeholder="Nhập mật khẩu" required>
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword()">👁</button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="remember-me" id="rememberMe">
                                <label class="form-check-label small" for="rememberMe">
                                    Ghi nhớ đăng nhập
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                            Đăng Nhập
                        </button>
                    </form>

                    <hr class="my-3">

                    <p class="text-center mb-0 small">
                        Chưa có tài khoản?
                        <a th:href="@{/auth/register}" class="text-primary fw-semibold">
                            Đăng ký ngay
                        </a>
                    </p>
                    <p class="text-center mt-2 mb-0">
                        <a th:href="@{/}" class="text-muted small">← Về trang chủ</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        input.type = input.type === 'password' ? 'text' : 'password';
    }
</script>
</body>
</html>
