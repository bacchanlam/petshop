<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .login-card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            padding: 2rem;
            text-align: center;
        }
        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .form-control { border-radius: 8px; padding: 12px 15px; border: 2px solid #e9ecef; }
        .form-control:focus { border-color: #0d6efd; box-shadow: none; }

        /* Giữ nút mắt hiển thị khi input-group được focus */
        .input-group .form-control { border-right: none; border-radius: 8px 0 0 8px !important; }
        .input-group .btn-outline-secondary {
            border: 2px solid #e9ecef;
            border-left: none;
            border-radius: 0 8px 8px 0 !important;
            background: white !important;
            color: #6c757d !important;
            transition: border-color 0.15s, color 0.15s;
        }
        .input-group .btn-outline-secondary:hover { color: #0d6efd !important; }
        .input-group:focus-within .form-control,
        .input-group:focus-within .btn-outline-secondary {
            border-color: #0d6efd;
        }
        .input-group:focus-within .form-control { box-shadow: none; }

        /* Tắt icon mắt mặc định của trình duyệt (Edge, IE, Chrome) */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear { display: none !important; }

        /* Lucide icon sizing helpers */
        .icon-header { width: 48px; height: 48px; stroke: white; }
        .icon-sm     { width: 16px; height: 16px; vertical-align: -2px; }
        .icon-eye    { width: 18px; height: 18px; }

        /* Auto-dismiss progress bar */
        .alert-autohide {
            position: relative;
            overflow: hidden;
        }
        .alert-autohide::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            height: 3px;
            background: rgba(255,255,255,0.6);
            animation: shrink 5s linear forwards;
        }
        @keyframes shrink {
            from { width: 100%; }
            to   { width: 0%; }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card border-0">
                <!-- Header -->
                <div class="login-header text-white">
                    <div class="mb-2 d-flex justify-content-center">
                        <i data-lucide="paw-print" class="icon-header"></i>
                    </div>
                    <h3 class="mb-0 fw-bold">PetShop</h3>
                    <p class="mb-0 opacity-75">Chào mừng bạn trở lại!</p>
                </div>

                <!-- Form -->
                <div class="card-body p-4">
                    <!-- Thông báo lỗi (hiển thị thường, không tự mất) -->
                    <div th:if="${errorMsg}" class="alert alert-danger rounded-3 py-2">
                        <small>
                            <i data-lucide="triangle-alert" class="icon-sm text-danger me-1"></i>
                            <span th:text="${errorMsg}"></span>
                        </small>
                    </div>

                    <!-- Thông báo thành công (tự mất sau 5s — dùng khi logout) -->
                    <div th:if="${successMsg}" id="successAlert"
                         class="alert alert-success rounded-3 py-2 alert-autohide">
                        <small>
                            <i data-lucide="circle-check" class="icon-sm text-success me-1"></i>
                            <span th:text="${successMsg}"></span>
                        </small>
                    </div>

                    <!-- Form đăng nhập -->
                    <form th:action="@{/auth/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Tên đăng nhập hoặc Email
                            </label>
                            <input type="text" name="username" class="form-control"
                                   placeholder="Nhập username hoặc email" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <div class="input-group">
                                <input type="password" name="password" id="passwordInput"
                                       class="form-control" placeholder="Nhập mật khẩu" required>
                                <button class="btn btn-outline-secondary d-flex align-items-center px-3"
                                        type="button" id="toggleBtn" title="Hiện/Ẩn mật khẩu">
                                    <!-- SVG eye inline — không dùng data-lucide để tránh bị re-render mất nút -->
                                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg"
                                         width="18" height="18" viewBox="0 0 24 24"
                                         fill="none" stroke="currentColor"
                                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="remember-me" id="rememberMe">
                                <label class="form-check-label small" for="rememberMe">
                                    Ghi nhớ đăng nhập
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-login btn-primary w-100 text-white d-flex align-items-center justify-content-center gap-2">
                            <i data-lucide="log-in" class="icon-sm"></i>
                            Đăng Nhập
                        </button>
                    </form>

                    <hr class="my-3">

                    <p class="text-center mb-0 small">
                        Chưa có tài khoản?
                        <a th:href="@{/auth/register}" class="text-primary fw-semibold">
                            Đăng ký ngay
                        </a>
                    </p>
                    <p class="text-center mt-2 mb-0">
                        <a th:href="@{/}" class="text-muted small d-inline-flex align-items-center gap-1">
                            <i data-lucide="arrow-left" class="icon-sm"></i>
                            Về trang chủ
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    lucide.createIcons();

    // SVG paths cho eye và eye-off
    const SVG_EYE = `
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
        <circle cx="12" cy="12" r="3"/>`;
    const SVG_EYE_OFF = `
        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
        <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
        <line x1="2" y1="2" x2="22" y2="22"/>`;

    document.getElementById('toggleBtn').addEventListener('click', function () {
        const input   = document.getElementById('passwordInput');
        const icon    = document.getElementById('eyeIcon');
        const isHidden = input.type === 'password';
        input.type    = isHidden ? 'text' : 'password';
        icon.innerHTML = isHidden ? SVG_EYE_OFF : SVG_EYE;
    });

    // Tự động ẩn thông báo thành công sau 5 giây (dùng khi logout)
    const successAlert = document.getElementById('successAlert');
    if (successAlert) {
        setTimeout(() => {
            successAlert.style.transition = 'opacity 0.5s ease, max-height 0.5s ease, padding 0.5s ease, margin 0.5s ease';
            successAlert.style.opacity    = '0';
            successAlert.style.maxHeight  = '0';
            successAlert.style.padding    = '0';
            successAlert.style.margin     = '0';
            setTimeout(() => successAlert.remove(), 500);
        }, 5000);
    }
</script>
</body>
</html>
