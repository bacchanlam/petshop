<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; }
        .register-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
        .register-header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            padding: 1.5rem 2rem;
            text-align: center;
        }
        .btn-register {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: none; border-radius: 8px;
            padding: 12px; font-size: 16px; font-weight: 600;
        }
        .form-control { border-radius: 8px; padding: 10px 14px; border: 2px solid #e9ecef; }
        .form-control:focus { border-color: #11998e; box-shadow: none; }
        .is-invalid { border-color: #dc3545 !important; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card register-card border-0">
                <!-- Header -->
                <div class="register-header text-white">
                    <div class="fs-2 mb-1">🐾</div>
                    <h4 class="mb-0 fw-bold">Tạo tài khoản mới</h4>
                    <p class="mb-0 opacity-75 small">Tham gia cộng đồng PetShop!</p>
                </div>

                <!-- Form -->
                <div class="card-body p-4">
                    <!-- Thông báo lỗi chung -->
                    <div th:if="${errorMsg}" class="alert alert-danger rounded-3 py-2">
                        <small>⚠️ <span th:text="${errorMsg}"></span></small>
                    </div>

                    <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Tên đăng nhập -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Tên đăng nhập <span class="text-danger">*</span>
                            </label>
                            <input type="text" th:field="*{username}"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   class="form-control" placeholder="4-50 ký tự, không dấu">
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Email <span class="text-danger">*</span>
                            </label>
                            <input type="email" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   class="form-control" placeholder="email@example.com">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>

                        <!-- Họ và tên -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Họ và tên <span class="text-danger">*</span>
                            </label>
                            <input type="text" th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                   class="form-control" placeholder="Nguyễn Văn A">
                            <div class="invalid-feedback" th:errors="*{fullName}"></div>
                        </div>

                        <!-- Số điện thoại -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <input type="tel" th:field="*{phone}"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                   class="form-control" placeholder="0xxxxxxxxx">
                            <div class="invalid-feedback" th:errors="*{phone}"></div>
                        </div>

                        <!-- Mật khẩu -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Mật khẩu <span class="text-danger">*</span>
                            </label>
                            <input type="password" th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   class="form-control" placeholder="Tối thiểu 6 ký tự">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>

                        <!-- Xác nhận mật khẩu -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Xác nhận mật khẩu <span class="text-danger">*</span>
                            </label>
                            <input type="password" th:field="*{confirmPassword}"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                   class="form-control" placeholder="Nhập lại mật khẩu">
                            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                        </div>

                        <button type="submit" class="btn btn-register btn-success w-100 text-white fw-bold">
                            Đăng Ký Ngay
                        </button>
                    </form>

                    <hr class="my-3">
                    <p class="text-center mb-0 small">
                        Đã có tài khoản?
                        <a th:href="@{/auth/login}" class="text-success fw-semibold">Đăng nhập</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
