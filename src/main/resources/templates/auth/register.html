<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký - PetShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      body {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        min-height: 100vh;
      }
      .register-card {
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }
      .register-header {
        background: linear-gradient(135deg, #11998e, #38ef7d);
        padding: 1.5rem 2rem;
        text-align: center;
      }
      .btn-register {
        background: linear-gradient(135deg, #11998e, #38ef7d);
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
      }
      .form-control {
        border-radius: 8px;
        padding: 10px 14px;
        border: 2px solid #e9ecef;
      }
      .form-control:focus {
        border-color: #11998e;
        box-shadow: none;
      }
      .is-invalid {
        border-color: #dc3545 !important;
      }

      /* Input group cho ô mật khẩu */
      .input-group .form-control {
        border-right: none;
        border-radius: 8px 0 0 8px !important;
      }
      .input-group .btn-eye {
        border: 2px solid #e9ecef;
        border-left: none;
        border-radius: 0 8px 8px 0 !important;
        background: white !important;
        color: #6c757d !important;
        padding: 0 14px;
        display: flex;
        align-items: center;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .input-group .btn-eye:hover {
        color: #11998e !important;
      }
      .input-group:focus-within .form-control,
      .input-group:focus-within .btn-eye {
        border-color: #11998e;
      }
      .input-group:focus-within .form-control {
        box-shadow: none;
      }
      /* Khi invalid, border đỏ cả input lẫn nút mắt */
      .input-group .form-control.is-invalid {
        border-color: #dc3545 !important;
      }
      .input-group .form-control.is-invalid ~ .btn-eye {
        border-color: #dc3545 !important;
      }

      /* Tắt icon mắt mặc định của trình duyệt (Edge/IE) */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
        display: none !important;
      }

      /* Icon sizing */
      .icon-header {
        width: 36px;
        height: 36px;
        stroke: white;
      }
      .icon-sm {
        width: 16px;
        height: 16px;
        vertical-align: -2px;
      }

      /* Auto-dismiss toast */
      .alert-autohide {
        position: relative;
        overflow: hidden;
      }
      .alert-autohide::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.6);
        animation: shrink 5s linear forwards;
      }
      @keyframes shrink {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card register-card border-0">
            <!-- Header -->
            <div class="register-header text-white">
              <div class="mb-1 d-flex justify-content-center">
                <i data-lucide="paw-print" class="icon-header"></i>
              </div>
              <h4 class="mb-0 fw-bold">Tạo tài khoản mới</h4>
              <p class="mb-0 opacity-75 small">Tham gia cộng đồng PetShop!</p>
            </div>

            <!-- Form -->
            <div class="card-body p-4">
              <!-- Thông báo lỗi chung -->
              <div
                th:if="${errorMsg}"
                class="alert alert-danger rounded-3 py-2"
              >
                <small>
                  <i
                    data-lucide="triangle-alert"
                    class="icon-sm text-danger me-1"
                  ></i>
                  <span th:text="${errorMsg}"></span>
                </small>
              </div>

              <!-- Thông báo thành công (tự mất sau 5s) -->
              <div
                th:if="${successMsg}"
                id="successAlert"
                class="alert alert-success rounded-3 py-2 alert-autohide"
              >
                <small>
                  <i
                    data-lucide="circle-check"
                    class="icon-sm text-success me-1"
                  ></i>
                  <span th:text="${successMsg}"></span>
                </small>
              </div>

              <form
                th:action="@{/auth/register}"
                th:object="${registerDTO}"
                method="post"
              >
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />

                <!-- Tên đăng nhập -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">
                    Tên đăng nhập <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    th:field="*{username}"
                    th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                    class="form-control"
                    placeholder="4-50 ký tự, không dấu"
                  />
                  <div class="invalid-feedback" th:errors="*{username}"></div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">
                    Email <span class="text-danger">*</span>
                  </label>
                  <input
                    type="email"
                    th:field="*{email}"
                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                    class="form-control"
                    placeholder="email@example.com"
                  />
                  <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>

                <!-- Họ và tên -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">
                    Họ và tên <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    th:field="*{fullName}"
                    th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                    class="form-control"
                    placeholder="Nguyễn Văn A"
                  />
                  <div class="invalid-feedback" th:errors="*{fullName}"></div>
                </div>

                <!-- Số điện thoại -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Số điện thoại</label>
                  <input
                    type="tel"
                    th:field="*{phone}"
                    th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                    class="form-control"
                    placeholder="0xxxxxxxxx"
                  />
                  <div class="invalid-feedback" th:errors="*{phone}"></div>
                </div>

                <!-- Mật khẩu -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">
                    Mật khẩu <span class="text-danger">*</span>
                  </label>
                  <div class="input-group">
                    <input
                      type="password"
                      th:field="*{password}"
                      id="passwordInput"
                      th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                      class="form-control"
                      placeholder="Tối thiểu 6 ký tự"
                    />
                    <button
                      type="button"
                      class="btn-eye"
                      id="togglePassword"
                      title="Hiện/Ẩn mật khẩu"
                    >
                      <svg
                        id="eyePassword"
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"
                        />
                        <circle cx="12" cy="12" r="3" />
                      </svg>
                    </button>
                  </div>
                  <div
                    class="invalid-feedback d-block"
                    th:if="${#fields.hasErrors('password')}"
                    th:errors="*{password}"
                  ></div>
                </div>

                <!-- Xác nhận mật khẩu -->
                <div class="mb-4">
                  <label class="form-label fw-semibold">
                    Xác nhận mật khẩu <span class="text-danger">*</span>
                  </label>
                  <div class="input-group">
                    <input
                      type="password"
                      th:field="*{confirmPassword}"
                      id="confirmPasswordInput"
                      th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                      class="form-control"
                      placeholder="Nhập lại mật khẩu"
                    />
                    <button
                      type="button"
                      class="btn-eye"
                      id="toggleConfirm"
                      title="Hiện/Ẩn mật khẩu"
                    >
                      <svg
                        id="eyeConfirm"
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"
                        />
                        <circle cx="12" cy="12" r="3" />
                      </svg>
                    </button>
                  </div>
                  <div
                    class="invalid-feedback d-block"
                    th:if="${#fields.hasErrors('confirmPassword')}"
                    th:errors="*{confirmPassword}"
                  ></div>
                </div>

                <button
                  type="submit"
                  class="btn btn-register btn-success w-100 text-white fw-bold d-flex align-items-center justify-content-center gap-2"
                >
                  <i data-lucide="user-plus" class="icon-sm"></i>
                  Đăng Ký Ngay
                </button>
              </form>

              <hr class="my-3" />
              <p class="text-center mb-0 small">
                Đã có tài khoản?
                <a
                  th:href="@{/auth/login}"
                  class="text-success fw-semibold d-inline-flex align-items-center gap-1"
                >
                  <i data-lucide="log-in" class="icon-sm"></i>
                  Đăng nhập
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      lucide.createIcons();

      // SVG paths
      const SVG_EYE = `
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
        <circle cx="12" cy="12" r="3"/>`;
      const SVG_EYE_OFF = `
        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
        <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
        <line x1="2" y1="2" x2="22" y2="22"/>`;

      function makeToggle(btnId, inputId, iconId) {
        document.getElementById(btnId).addEventListener("click", function () {
          const input = document.getElementById(inputId);
          const icon = document.getElementById(iconId);
          const isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          icon.innerHTML = isHidden ? SVG_EYE_OFF : SVG_EYE;
        });
      }

      makeToggle("togglePassword", "passwordInput", "eyePassword");
      makeToggle("toggleConfirm", "confirmPasswordInput", "eyeConfirm");

      // Tự động ẩn thông báo thành công sau 5 giây
      const successAlert = document.getElementById("successAlert");
      if (successAlert) {
        setTimeout(() => {
          successAlert.style.transition =
            "opacity 0.5s ease, max-height 0.5s ease, padding 0.5s ease, margin 0.5s ease";
          successAlert.style.opacity = "0";
          successAlert.style.maxHeight = "0";
          successAlert.style.padding = "0";
          successAlert.style.margin = "0";
          setTimeout(() => successAlert.remove(), 500);
        }, 5000);
      }
    </script>
  </body>
</html>
