<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quên Mật khẩu - PetShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .card {
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }
      .header {
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        padding: 2rem;
        text-align: center;
      }
      .icon-header {
        width: 48px;
        height: 48px;
        stroke: white;
      }
      .icon-sm {
        width: 16px;
        height: 16px;
        vertical-align: -2px;
      }
      .btn-action {
        border-radius: 8px;
        padding: 12px 24px;
        font-weight: 600;
      }
      .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 2px solid #e9ecef;
      }
      .form-control:focus {
        border-color: #0d6efd;
        box-shadow: none;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="card">
            <!-- Header -->
            <div class="header text-white">
              <div class="mb-2 d-flex justify-content-center">
                <i data-lucide="key" class="icon-header"></i>
              </div>
              <h3 class="mb-0 fw-bold">Quên Mật khẩu</h3>
              <p class="mb-0 opacity-75">
                Nhập email để nhận link đặt lại mật khẩu
              </p>
            </div>

            <!-- Form -->
            <div class="card-body p-4">
              <!-- Thông báo lỗi -->
              <div
                th:if="${errorMsg}"
                class="alert alert-danger rounded-3 py-2 mb-3"
              >
                <small>
                  <i
                    data-lucide="triangle-alert"
                    class="icon-sm text-danger me-1"
                  ></i>
                  <span th:text="${errorMsg}"></span>
                </small>
              </div>

              <!-- Form -->
              <form th:action="@{/auth/forgot-password}" method="post">
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />

                <div class="mb-3">
                  <label class="form-label fw-semibold">Email</label>
                  <input
                    type="email"
                    name="email"
                    th:value="${email}"
                    class="form-control"
                    placeholder="Nhập email của bạn"
                    required
                    autofocus
                  />
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-action">
                  <i
                    data-lucide="mail"
                    class="icon-sm me-2"
                    style="display: inline-block; width: 16px; height: 16px"
                  ></i>
                  Gửi link reset
                </button>
              </form>

              <hr class="my-3" />

              <!-- Link quay lại -->
              <div class="text-center">
                <p class="mb-0">
                  <a
                    th:href="@{/auth/login}"
                    class="text-muted small d-inline-flex align-items-center gap-1"
                  >
                    <i data-lucide="arrow-left" class="icon-sm"></i>
                    Quay lại đăng nhập
                  </a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
