<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gửi Lại Email Xác nhận - PetShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .card {
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }
      .header {
        background: linear-gradient(135deg, #28a745, #20c997);
        padding: 2rem;
        text-align: center;
      }
      .icon-header {
        width: 48px;
        height: 48px;
        stroke: white;
      }
      .icon-sm {
        width: 16px;
        height: 16px;
        vertical-align: -2px;
      }
      .btn-action {
        border-radius: 8px;
        padding: 12px 24px;
        font-weight: 600;
      }
      .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 2px solid #e9ecef;
      }
      .form-control:focus {
        border-color: #28a745;
        box-shadow: none;
      }

      /* Auto-dismiss progress bar */
      .alert-autohide {
        position: relative;
        overflow: hidden;
      }
      .alert-autohide::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(255, 255, 255, 0.6);
        animation: shrink 5s linear forwards;
      }
      @keyframes shrink {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="card border-0">
            <!-- Header -->
            <div class="header text-white">
              <div class="mb-2 d-flex justify-content-center">
                <i data-lucide="mail" class="icon-header"></i>
              </div>
              <h3 class="mb-0 fw-bold">Gửi Lại Email Xác nhận</h3>
            </div>

            <!-- Body -->
            <div class="card-body p-4">
              <!-- Lỗi -->
              <div
                th:if="${errorMsg}"
                class="alert alert-danger rounded-3 py-2 mb-3"
              >
                <small>
                  <i
                    data-lucide="triangle-alert"
                    class="icon-sm text-danger me-1"
                  ></i>
                  <span th:text="${errorMsg}"></span>
                </small>
              </div>

              <!-- Thành công -->
              <div
                th:if="${successMsg}"
                id="successAlert"
                class="alert alert-success rounded-3 py-2 alert-autohide mb-3"
              >
                <small>
                  <i
                    data-lucide="circle-check"
                    class="icon-sm text-success me-1"
                  ></i>
                  <span th:text="${successMsg}"></span>
                </small>
              </div>

              <p class="text-center mb-4 small text-muted">
                Nhập email của bạn để nhận lại link xác nhận email.
              </p>

              <!-- Form -->
              <form th:action="@{/auth/resend-verification-email}" method="get">
                <div class="mb-3">
                  <label class="form-label fw-semibold">Email</label>
                  <input
                    type="email"
                    name="email"
                    th:value="${email}"
                    class="form-control"
                    placeholder="email@example.com"
                    required
                  />
                </div>

                <button
                  type="submit"
                  class="btn btn-success btn-action w-100 text-white d-flex align-items-center justify-content-center gap-2"
                >
                  <i data-lucide="send" class="icon-sm"></i>
                  Gửi Email Xác nhận
                </button>
              </form>

              <hr class="my-3" />

              <p class="text-center mb-0 small">
                <a th:href="@{/auth/login}" class="text-primary fw-semibold">
                  Quay lại đăng nhập
                </a>
              </p>
              <p class="text-center mt-2 mb-0">
                <a
                  th:href="@{/}"
                  class="text-muted small d-inline-flex align-items-center gap-1"
                >
                  <i data-lucide="arrow-left" class="icon-sm"></i>
                  Trang chủ
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      lucide.createIcons();

      // Tự động ẩn thông báo thành công sau 5 giây
      const successAlert = document.getElementById("successAlert");
      if (successAlert) {
        setTimeout(() => {
          successAlert.style.transition =
            "opacity 0.5s ease, max-height 0.5s ease, padding 0.5s ease, margin 0.5s ease";
          successAlert.style.opacity = "0";
          successAlert.style.maxHeight = "0";
          successAlert.style.padding = "0";
          successAlert.style.margin = "0";
          setTimeout(() => successAlert.remove(), 500);
        }, 5000);
      }
    </script>
  </body>
</html>
