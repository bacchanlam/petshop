<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle + ' - PetShop'}">Sản phẩm - PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .filter-card  { border-radius:12px; border:none; box-shadow:0 2px 10px rgba(0,0,0,.08); }
        .product-card { border-radius:12px; border:none; transition:transform .2s, box-shadow .2s; }
        .product-card:hover { transform:translateY(-4px); box-shadow:0 10px 25px rgba(0,0,0,.12); }
        .product-img  { height:185px; object-fit:cover; border-radius:12px 12px 0 0; width:100%; }
        .price-tag    { color:#e74c3c; font-weight:700; }
        .star-rating  { color:#f39c12; }
        .filter-title { font-weight:700; font-size:.85rem; text-transform:uppercase;
                        letter-spacing:.5px; color:#6c757d; }
        .active-filter { background:#0d6efd; color:white !important; border-color:#0d6efd !important; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}"></li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- ===== SIDEBAR LỌC ===== -->
        <div class="col-lg-3">
            <div class="card filter-card p-3">
                <h6 class="filter-title mb-3 d-flex align-items-center gap-2">
                    <i data-lucide="sliders-horizontal" style="width:14px;height:14px"></i>
                    Bộ lọc tìm kiếm
                </h6>
                <form th:action="@{/products}" method="get" id="filterForm">

                    <!-- Từ khóa -->
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Tên sản phẩm</label>
                        <input type="text" name="keyword" class="form-control form-control-sm"
                               placeholder="Tìm kiếm..."
                               th:value="${filter.keyword}">
                    </div>

                    <!-- Danh mục -->
                    <div class="mb-3">
                        <label class="filter-title mb-2 d-block">Danh mục</label>
                        <div class="d-flex flex-wrap gap-1">
                            <a th:href="@{/products(keyword=${filter.keyword}, petType=${filter.petType}, sortBy=${filter.sortBy})}"
                               th:classappend="${filter.categoryId == null} ? 'active-filter'"
                               class="btn btn-outline-secondary btn-sm">Tất cả</a>
                            <a th:each="cat : ${categories}"
                               th:href="@{/products(keyword=${filter.keyword}, categoryId=${cat.id}, petType=${filter.petType}, sortBy=${filter.sortBy})}"
                               th:classappend="${filter.categoryId == cat.id} ? 'active-filter'"
                               th:text="${cat.name}"
                               class="btn btn-outline-secondary btn-sm"></a>
                        </div>
                    </div>

                    <!-- Loại thú cưng -->
                    <div class="mb-3">
                        <label class="filter-title mb-2 d-block">Loại thú cưng</label>
                        <div class="d-flex flex-wrap gap-1">
                            <a th:href="@{/products(keyword=${filter.keyword}, categoryId=${filter.categoryId}, sortBy=${filter.sortBy})}"
                               th:classappend="${filter.petType == null} ? 'active-filter'"
                               class="btn btn-outline-secondary btn-sm">Tất cả</a>
                            <a th:each="type : ${petTypes}"
                               th:href="@{/products(keyword=${filter.keyword}, categoryId=${filter.categoryId}, petType=${type}, sortBy=${filter.sortBy})}"
                               th:classappend="${filter.petType == type} ? 'active-filter'"
                               th:text="${type.displayName}"
                               class="btn btn-outline-secondary btn-sm"></a>
                        </div>
                    </div>

                    <!-- Thương hiệu -->
                    <div class="mb-3" th:if="${not #lists.isEmpty(brands)}">
                        <label class="form-label small fw-semibold">Thương hiệu</label>
                        <select name="brand" class="form-select form-select-sm">
                            <option value="">-- Tất cả --</option>
                            <option th:each="b : ${brands}"
                                    th:value="${b}" th:text="${b}"
                                    th:selected="${filter.brand == b}"></option>
                        </select>
                    </div>

                    <!-- Khoảng giá -->
                    <div class="mb-3">
                        <label class="filter-title mb-2 d-block">Khoảng giá (₫)</label>
                        <div class="row g-2">
                            <div class="col-6">
                                <input type="number" name="minPrice" class="form-control form-control-sm"
                                       placeholder="Từ" th:value="${filter.minPrice}" min="0" step="10000">
                            </div>
                            <div class="col-6">
                                <input type="number" name="maxPrice" class="form-control form-control-sm"
                                       placeholder="Đến" th:value="${filter.maxPrice}" min="0" step="10000">
                            </div>
                        </div>
                    </div>

                    <input type="hidden" name="sortBy" th:value="${filter.sortBy}">

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-sm d-flex align-items-center justify-content-center gap-1">
                            <i data-lucide="search" style="width:13px;height:13px"></i>
                            Lọc
                        </button>
                        <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm d-flex align-items-center justify-content-center gap-1">
                            <i data-lucide="rotate-ccw" style="width:13px;height:13px"></i>
                            Xóa bộ lọc
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- ===== DANH SÁCH SẢN PHẨM ===== -->
        <div class="col-lg-9">
            <!-- Header: tiêu đề + sắp xếp -->
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div>
                    <h5 class="fw-bold mb-0" th:text="${pageTitle}"></h5>
                    <small class="text-muted"
                           th:text="'Tìm thấy ' + ${products.totalElements} + ' sản phẩm'"></small>
                </div>
                <!-- Sắp xếp -->
                <div class="d-flex align-items-center gap-2">
                    <small class="text-muted">Sắp xếp:</small>
                    <a th:href="@{/products(keyword=${filter.keyword}, categoryId=${filter.categoryId}, petType=${filter.petType}, brand=${filter.brand}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, sortBy='newest')}"
                       th:classappend="${filter.sortBy == 'newest' or filter.sortBy == null} ? 'btn-primary' : 'btn-outline-secondary'"
                       class="btn btn-sm">Mới nhất</a>
                    <a th:href="@{/products(keyword=${filter.keyword}, categoryId=${filter.categoryId}, petType=${filter.petType}, brand=${filter.brand}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, sortBy='price_asc')}"
                       th:classappend="${filter.sortBy == 'price_asc'} ? 'btn-primary' : 'btn-outline-secondary'"
                       class="btn btn-sm">Giá ↑</a>
                    <a th:href="@{/products(keyword=${filter.keyword}, categoryId=${filter.categoryId}, petType=${filter.petType}, brand=${filter.brand}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, sortBy='price_desc')}"
                       th:classappend="${filter.sortBy == 'price_desc'} ? 'btn-primary' : 'btn-outline-secondary'"
                       class="btn btn-sm">Giá ↓</a>
                </div>
            </div>

            <!-- Grid sản phẩm -->
            <div class="row g-3">
                <div th:each="p : ${products}" class="col-6 col-md-4 col-xl-3">
                    <div class="card product-card h-100 shadow-sm">
                        <a th:href="@{/products/{id}(id=${p.id})}">
                            <img th:if="${p.thumbnail != null}"
                                 th:src="@{'/uploads/products/' + ${p.thumbnail}}"
                                 class="product-img" alt="ảnh">
                            <img th:unless="${p.thumbnail != null}"
                                 src="/images/no-image.png" class="product-img" alt="no image">
                        </a>
                        <div class="card-body d-flex flex-column p-2">
                            <span class="badge bg-primary mb-1 align-self-start"
                                  style="font-size:.65rem"
                                  th:text="${p.petType.displayName}"></span>
                            <a th:href="@{/products/{id}(id=${p.id})}"
                               class="text-decoration-none text-dark">
                                <p class="fw-semibold mb-1 small"
                                   th:text="${#strings.abbreviate(p.name, 40)}"></p>
                            </a>
                            <small class="text-muted d-block mb-1" th:text="${p.brand ?: ''}"></small>
                            <div class="star-rating" style="font-size:.75rem"
                                 th:if="${p.averageRating > 0}">
                                <span th:each="i : ${#numbers.sequence(1,5)}"
                                      th:text="${i <= p.averageRating} ? '★' : '☆'"></span>
                            </div>
                            <div class="mt-auto pt-1">
                                <div class="price-tag small mb-2"
                                     th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT') + ' ₫'}"></div>
                                <div th:if="${p.stock > 0}">
                                    <form th:action="@{/cart/add}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="productId" th:value="${p.id}"/>
                                        <input type="hidden" name="quantity" value="1"/>
                                        <button type="submit" class="btn btn-primary btn-sm w-100 d-flex align-items-center justify-content-center gap-1"
                                                style="font-size:.75rem">
                                            <i data-lucide="shopping-cart" style="width:12px;height:12px"></i>
                                            Thêm giỏ
                                        </button>
                                    </form>
                                </div>
                                <div th:unless="${p.stock > 0}">
                                    <button class="btn btn-secondary btn-sm w-100"
                                            style="font-size:.75rem" disabled>Hết hàng</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Không có sản phẩm -->
                <div th:if="${products.empty}" class="col-12 text-center py-5">
                    <div class="text-muted">
                        <div class="mb-3 d-flex justify-content-center">
                            <i data-lucide="search-x" style="width:56px;height:56px;color:#adb5bd"></i>
                        </div>
                        <h5>Không tìm thấy sản phẩm</h5>
                        <p>Hãy thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</p>
                        <a th:href="@{/products}" class="btn btn-primary">Xem tất cả sản phẩm</a>
                    </div>
                </div>
            </div>

            <!-- Phân trang -->
            <nav class="mt-4" th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/products(keyword=${filter.keyword},categoryId=${filter.categoryId},petType=${filter.petType},brand=${filter.brand},minPrice=${filter.minPrice},maxPrice=${filter.maxPrice},sortBy=${filter.sortBy},page=${currentPage - 1})}">
                            &laquo;
                        </a>
                    </li>
                    <li class="page-item disabled"
                        th:if="${currentPage > 5}">
                        <span class="page-link">...</span>
                    </li>
                    <th:block th:with="
                        startPage=${currentPage > 5 ? currentPage - 5 : 0},
                        endPage=${currentPage > 5 ? (currentPage + 4 < totalPages ? currentPage + 4 : totalPages - 1) : (9 < totalPages - 1 ? 9 : totalPages - 1)}
                    ">
                        <li th:each="i : ${#numbers.sequence(startPage, endPage)}"
                            class="page-item" th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{/products(keyword=${filter.keyword},categoryId=${filter.categoryId},petType=${filter.petType},brand=${filter.brand},minPrice=${filter.minPrice},maxPrice=${filter.maxPrice},sortBy=${filter.sortBy},page=${i})}"
                               th:text="${i + 1}"></a>
                        </li>
                    </th:block>
                    <li class="page-item disabled"
                        th:if="${currentPage < totalPages - 6}">
                        <span class="page-link">...</span>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/products(keyword=${filter.keyword},categoryId=${filter.categoryId},petType=${filter.petType},brand=${filter.brand},minPrice=${filter.minPrice},maxPrice=${filter.maxPrice},sortBy=${filter.sortBy},page=${currentPage + 1})}">
                            &raquo;
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    lucide.createIcons();

    fetch('/cart/count').then(r => r.json())
        .then(d => { const el = document.getElementById('cartCount'); if(el && d.count > 0) el.textContent = d.count; })
        .catch(()=>{});
</script>
<div th:replace="~{fragments/site-ws :: site-ws('PRODUCT_LIST', 0)}"></div>
</body>
</html>
