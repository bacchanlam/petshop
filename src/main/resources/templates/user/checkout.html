<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt Hàng - PetShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .section-card { border-radius:14px; border:none; box-shadow:0 2px 12px rgba(0,0,0,.08); }
    .order-img    { width:55px; height:55px; object-fit:cover; border-radius:8px; }
    .price-col    { color:#e74c3c; font-weight:700; }
    .summary-sticky { position:sticky; top:80px; }
    .payment-option {
      border:2px solid #dee2e6; border-radius:10px; padding:14px 16px;
      cursor:pointer; transition:all .2s; margin-bottom:12px;
    }
    .payment-option:hover  { border-color:#0d6efd; background:#f0f5ff; }
    .payment-option.selected { border-color:#0d6efd; background:#e8f0fe; }
    .payment-option.momo-option.selected { border-color:#ae2070; background:#fdf0f6; }
    .payment-option.momo-option:hover    { border-color:#ae2070; background:#fdf0f6; }
    .momo-logo { width:28px; height:28px; border-radius:6px; }
    .step-badge {
      width:28px; height:28px; border-radius:50%; background:#0d6efd;
      color:white; font-weight:700; display:inline-flex;
      align-items:center; justify-content:center; font-size:.85rem;
    }
  </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
      <li class="breadcrumb-item"><a th:href="@{/cart}">Giỏ hàng</a></li>
      <li class="breadcrumb-item active">Đặt hàng</li>
    </ol>
  </nav>

  <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2">
    <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0"></i>
    <span th:text="${errorMsg}"></span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
  </div>

  <!-- ================================================================
       FORM CHUNG: chứa tất cả input thông tin giao hàng + payment method
       Action sẽ được JS thay đổi tuỳ phương thức thanh toán
       ================================================================ -->
  <form id="checkoutForm"
        th:action="@{/orders/checkout}"
        th:object="${orderRequestDTO}"
        method="post">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="row g-4">
      <!-- ===== CỘT TRÁI ===== -->
      <div class="col-lg-7">

        <!-- Thông tin giao hàng -->
        <div class="card section-card p-4 mb-4">
          <h6 class="fw-bold mb-4 d-flex align-items-center gap-2">
            <span class="step-badge">1</span>
            <i data-lucide="map-pin" style="width:17px;height:17px;color:#6c757d"></i>
            Thông tin giao hàng
          </h6>

          <div class="mb-3">
            <label class="form-label fw-semibold">Họ tên người nhận <span class="text-danger">*</span></label>
            <input type="text" th:field="*{fullName}"
                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                   class="form-control" placeholder="Nguyễn Văn A">
            <div class="invalid-feedback" th:errors="*{fullName}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Số điện thoại <span class="text-danger">*</span></label>
            <input type="tel" th:field="*{phone}"
                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                   class="form-control" placeholder="0xxxxxxxxx">
            <div class="invalid-feedback" th:errors="*{phone}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Địa chỉ giao hàng <span class="text-danger">*</span></label>
            <textarea th:field="*{address}"
                      th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"
                      class="form-control" rows="2"
                      placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành"></textarea>
            <div class="invalid-feedback" th:errors="*{address}"></div>
          </div>

          <div class="mb-0">
            <label class="form-label fw-semibold">Ghi chú đơn hàng</label>
            <textarea th:field="*{note}" class="form-control" rows="2"
                      placeholder="Ghi chú thêm (tùy chọn)..."></textarea>
          </div>
        </div>

        <!-- Phương thức thanh toán -->
        <div class="card section-card p-4">
          <h6 class="fw-bold mb-4 d-flex align-items-center gap-2">
            <span class="step-badge">2</span>
            <i data-lucide="credit-card" style="width:17px;height:17px;color:#6c757d"></i>
            Phương thức thanh toán
          </h6>

          <!-- COD -->
          <label class="payment-option d-block"
                 th:classappend="${orderRequestDTO.paymentMethod?.name() == 'COD' or orderRequestDTO.paymentMethod == null} ? 'selected'">
            <div class="d-flex align-items-center gap-3">
              <input type="radio" th:field="*{paymentMethod}" value="COD"
                     class="form-check-input mt-0"
                     onchange="handlePaymentChange(this)">
              <div>
                <div class="fw-semibold d-flex align-items-center gap-2">
                  <i data-lucide="banknote" style="width:16px;height:16px;color:#198754"></i>
                  Thanh toán khi nhận hàng (COD)
                </div>
                <small class="text-muted">Thanh toán bằng tiền mặt khi nhận hàng</small>
              </div>
            </div>
          </label>

          <!-- Chuyển khoản -->
          <label class="payment-option d-block"
                 th:classappend="${orderRequestDTO.paymentMethod?.name() == 'TRANSFER'} ? 'selected'">
            <div class="d-flex align-items-center gap-3">
              <input type="radio" th:field="*{paymentMethod}" value="TRANSFER"
                     class="form-check-input mt-0"
                     onchange="handlePaymentChange(this)">
              <div>
                <div class="fw-semibold d-flex align-items-center gap-2">
                  <i data-lucide="building-2" style="width:16px;height:16px;color:#0d6efd"></i>
                  Chuyển khoản ngân hàng
                </div>
                <small class="text-muted">Quét mã QR VietQR — hỗ trợ mọi app ngân hàng</small>
              </div>
            </div>
            <!-- Thông tin chuyển khoản (ẩn mặc định, hiện khi chọn) -->
            <div id="transferInfo" class="mt-3 p-3 bg-light rounded-3"
                 th:style="${orderRequestDTO.paymentMethod?.name() == 'TRANSFER'} ? 'display:block' : 'display:none'">
              <div class="row g-2 small">
                <div class="col-6"><strong>Ngân hàng:</strong><br>MB Bank</div>
                <div class="col-6"><strong>Số tài khoản:</strong><br>1234567890</div>
                <div class="col-6"><strong>Chủ tài khoản:</strong><br>NGUYEN VAN A</div>
                <div class="col-6"><strong>Nội dung CK:</strong><br>DH + mã đơn hàng</div>
              </div>
              <div class="alert alert-warning py-2 mt-2 small mb-0">
                <i data-lucide="info" style="width:14px;height:14px"></i>
                Đơn hàng sẽ được xác nhận sau khi chúng tôi nhận được tiền chuyển khoản.
              </div>
            </div>
          </label>

          <!-- MoMo -->
          <label class="payment-option momo-option d-block"
                 th:classappend="${orderRequestDTO.paymentMethod?.name() == 'MOMO'} ? 'selected'">
            <div class="d-flex align-items-center gap-3">
              <input type="radio" th:field="*{paymentMethod}" value="MOMO"
                     class="form-check-input mt-0"
                     onchange="handlePaymentChange(this)">
              <div class="d-flex align-items-center gap-2">
                <!-- MoMo logo SVG inline -->
                <svg class="momo-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect width="100" height="100" rx="20" fill="#ae2070"/>
                  <text x="50" y="65" font-size="42" text-anchor="middle" fill="white" font-weight="bold" font-family="Arial">M</text>
                </svg>
                <div>
                  <div class="fw-semibold" style="color:#ae2070">Ví MoMo</div>
                  <small class="text-muted">Thanh toán qua ATM / QR Code / Ví MoMo</small>
                </div>
              </div>
            </div>
            <!-- Ghi chú MoMo -->
            <div id="momoInfo" class="mt-3 p-3 rounded-3"
                 style="background:#fdf0f6;display:none"
                 th:style="${orderRequestDTO.paymentMethod?.name() == 'MOMO'} ? 'display:block;background:#fdf0f6' : 'display:none'">
              <div class="d-flex align-items-center gap-2 small" style="color:#ae2070">
                <i data-lucide="info" style="width:14px;height:14px"></i>
                Bạn sẽ được chuyển sang trang MoMo để hoàn tất thanh toán. Hỗ trợ ATM nội địa, QR Pay và ví MoMo.
              </div>
            </div>
          </label>

          <div th:if="${#fields.hasErrors('paymentMethod')}"
               class="text-danger small mt-1" th:errors="*{paymentMethod}"></div>
        </div>
      </div>

      <!-- ===== CỘT PHẢI: Tóm tắt ===== -->
      <div class="col-lg-5">
        <div class="card section-card p-4 summary-sticky">
          <h6 class="fw-bold mb-4 d-flex align-items-center gap-2">
            <span class="step-badge">3</span>
            <i data-lucide="receipt-text" style="width:17px;height:17px;color:#6c757d"></i>
            Xác nhận đơn hàng
          </h6>

          <!-- Sản phẩm -->
          <div th:each="item : ${cart.items}" class="d-flex gap-3 align-items-center mb-3">
            <img th:if="${item.product.thumbnail != null}"
                 th:src="@{'/uploads/products/' + ${item.product.thumbnail}}"
                 class="order-img" alt="ảnh">
            <img th:unless="${item.product.thumbnail != null}"
                 src="/images/no-image.png" class="order-img" alt="no image">
            <div class="flex-grow-1">
              <p class="mb-0 small fw-semibold"
                 th:text="${#strings.abbreviate(item.product.name, 35)}"></p>
              <small class="text-muted">x<span th:text="${item.quantity}"></span></small>
            </div>
            <div class="price-col small"
                 th:text="${#numbers.formatDecimal(item.subTotal,0,'COMMA',0,'POINT') + ' ₫'}"></div>
          </div>

          <hr>

          <div class="d-flex justify-content-between mb-2 small">
            <span class="text-muted">Tạm tính</span>
            <span th:text="${#numbers.formatDecimal(subtotal,0,'COMMA',0,'POINT') + ' ₫'}"></span>
          </div>
          <div class="d-flex justify-content-between mb-2 small">
            <span class="text-muted">Phí vận chuyển</span>
            <span th:if="${shippingFee.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                  class="text-success fw-semibold">Miễn phí</span>
            <span th:unless="${shippingFee.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                  th:text="${#numbers.formatDecimal(shippingFee,0,'COMMA',0,'POINT') + ' ₫'}"></span>
          </div>

          <hr>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <span class="fw-bold">Tổng thanh toán</span>
            <span class="fw-bold fs-5 text-danger"
                  th:text="${#numbers.formatDecimal(grandTotal,0,'COMMA',0,'POINT') + ' ₫'}"></span>
          </div>

          <!-- NÚT ĐẶT HÀNG — label thay đổi theo phương thức -->
          <button type="submit" id="submitBtn"
                  class="btn btn-primary w-100 btn-lg fw-semibold d-flex align-items-center justify-content-center gap-2">
            <i data-lucide="check-circle" style="width:18px;height:18px"></i>
            <span id="submitLabel">Đặt Hàng Ngay</span>
          </button>

          <a th:href="@{/cart}"
             class="btn btn-outline-secondary w-100 mt-2 d-flex align-items-center justify-content-center gap-2">
            <i data-lucide="arrow-left" style="width:15px;height:15px"></i>
            Quay lại giỏ hàng
          </a>

          <!-- Phương thức thanh toán chấp nhận -->
          <div class="text-center mt-3">
            <small class="text-muted d-block mb-2">Chúng tôi chấp nhận</small>
            <div class="d-flex justify-content-center gap-2 flex-wrap">
              <span class="badge bg-light text-dark border px-2 py-1">💵 COD</span>
              <span class="badge bg-light text-dark border px-2 py-1">🏦 Chuyển khoản</span>
              <span class="badge px-2 py-1" style="background:#fdf0f6;color:#ae2070;border:1px solid #f5c4d8">M MoMo</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  lucide.createIcons();

  const CSRF_TOKEN = /*[[${_csrf.token}]]*/  '';
  const CSRF_HEADER = /*[[${_csrf.parameterName}]]*/  '_csrf';

  // ===== XỬ LÝ CHỌN PHƯƠNG THỨC THANH TOÁN =====
  function handlePaymentChange(radio) {
    // Reset style tất cả options
    document.querySelectorAll('.payment-option').forEach(el => {
      el.classList.remove('selected');
    });
    // Active option được chọn
    radio.closest('.payment-option').classList.add('selected');

    const method = radio.value;
    const form = document.getElementById('checkoutForm');
    const submitLabel = document.getElementById('submitLabel');
    const submitBtn = document.getElementById('submitBtn');

    // Toggle info panels
    const transferInfo = document.getElementById('transferInfo');
    const momoInfo = document.getElementById('momoInfo');
    if (transferInfo) transferInfo.style.display = 'none';
    if (momoInfo) momoInfo.style.display = 'none';

    if (method === 'MOMO') {
      // Đổi action form → gọi /payment/momo/create
      form.action = '/payment/momo/create';
      submitLabel.textContent = 'Thanh toán qua MoMo';
      submitBtn.className = 'btn w-100 btn-lg fw-semibold d-flex align-items-center justify-content-center gap-2';
      submitBtn.style.cssText = 'background:#ae2070;color:white;border:none;border-radius:8px;padding:14px;';
      if (momoInfo) momoInfo.style.display = 'block';
    } else if (method === 'TRANSFER') {
      form.action = '/orders/checkout';
      submitLabel.textContent = 'Đặt Hàng & Chuyển Khoản';
      submitBtn.className = 'btn btn-primary w-100 btn-lg fw-semibold d-flex align-items-center justify-content-center gap-2';
      submitBtn.style.cssText = '';
      if (transferInfo) transferInfo.style.display = 'block';
    } else {
      // COD
      form.action = '/orders/checkout';
      submitLabel.textContent = 'Đặt Hàng Ngay';
      submitBtn.className = 'btn btn-primary w-100 btn-lg fw-semibold d-flex align-items-center justify-content-center gap-2';
      submitBtn.style.cssText = '';
    }
  }

  // ===== KHỞI TẠO KHI LOAD TRANG =====
  document.addEventListener('DOMContentLoaded', () => {
    const checkedRadio = document.querySelector('input[name="paymentMethod"]:checked');
    if (checkedRadio) handlePaymentChange(checkedRadio);

    // Loading state khi submit
    document.getElementById('checkoutForm').addEventListener('submit', () => {
      const btn = document.getElementById('submitBtn');
      const method = document.querySelector('input[name="paymentMethod"]:checked')?.value;
      if (method === 'MOMO') {
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang chuyển sang MoMo...';
        btn.disabled = true;
      }
    });
  });
</script>
</body>
</html>
