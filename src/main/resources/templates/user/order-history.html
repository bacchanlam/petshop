<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Đơn Hàng - PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .order-card { border-radius:12px; border:none; transition:box-shadow .2s; }
        .order-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.1); }
        .status-badge { font-size:.8rem; padding:5px 12px; border-radius:20px; font-weight:600; }
        .status-PENDING   { background:#fff3cd; color:#856404; }
        .status-CONFIRMED { background:#cfe2ff; color:#084298; }
        .status-SHIPPING  { background:#d1ecf1; color:#0c5460; }
        .status-COMPLETED { background:#d4edda; color:#155724; }
        .status-CANCELLED { background:#f8d7da; color:#721c24; }
        .product-thumb    { width:45px; height:45px; object-fit:cover; border-radius:8px; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item active">Lịch sử đơn hàng</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0 d-flex align-items-center gap-2">
            <i data-lucide="clock" style="width:22px;height:22px;color:#0d6efd"></i>
            Lịch Sử Đơn Hàng
        </h4>
        <a th:href="@{/products}" class="btn btn-primary btn-sm d-flex align-items-center gap-1">
            <i data-lucide="shopping-bag" style="width:14px;height:14px"></i>
            Tiếp tục mua sắm
        </a>
    </div>

    <!-- Thông báo -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2">
        <i data-lucide="check-circle-2" style="width:16px;height:16px;flex-shrink:0"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <!-- Không có đơn hàng -->
    <div th:if="${orders.empty}" class="text-center py-5">
        <div class="mb-3 d-flex justify-content-center">
            <i data-lucide="inbox" style="width:56px;height:56px;color:#adb5bd"></i>
        </div>
        <h5 class="text-muted">Bạn chưa có đơn hàng nào</h5>
        <a th:href="@{/products}" class="btn btn-primary mt-3 d-inline-flex align-items-center gap-2">
            <i data-lucide="shopping-bag" style="width:16px;height:16px"></i>
            Mua sắm ngay
        </a>
    </div>

    <!-- Danh sách đơn hàng -->
    <div th:each="order : ${orders}" class="card order-card shadow-sm mb-3"
         th:attr="data-order-id=${order.id}">
        <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <span class="fw-bold">#<span th:text="${order.id}"></span></span>
                <span class="text-muted small ms-2"
                      th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="status-badge"
                      th:classappend="'status-' + ${order.status}"
                      th:text="${order.status.displayName}"></span>
                <a th:href="@{/orders/{id}(id=${order.id})}"
                   class="btn btn-sm btn-outline-primary d-flex align-items-center gap-1">
                    <i data-lucide="eye" style="width:13px;height:13px"></i>
                    Xem chi tiết
                </a>
            </div>
        </div>

        <div class="card-body p-3">
            <!-- Sản phẩm trong đơn -->
            <div class="d-flex gap-2 flex-wrap mb-3">
                <div th:each="item : ${order.orderItems}"
                     class="d-flex align-items-center gap-2 me-3">
                    <img th:if="${item.productImg != null}"
                         th:src="@{'/uploads/products/' + ${item.productImg}}"
                         class="product-thumb" alt="ảnh">
                    <img th:unless="${item.productImg != null}"
                         src="/images/no-image.png" class="product-thumb" alt="no image">
                    <div>
                        <p class="mb-0 small fw-semibold"
                           th:text="${#strings.abbreviate(item.productName, 30)}"></p>
                        <small class="text-muted">
                            x<span th:text="${item.quantity}"></span> —
                            <span th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT') + ' ₫'}"></span>
                        </small>
                    </div>
                </div>
            </div>

            <!-- Tổng tiền & thông tin giao hàng -->
            <div class="d-flex justify-content-between align-items-end flex-wrap gap-2">
                <div class="small text-muted">
                    <div class="d-flex align-items-center gap-1 mb-1">
                        <i data-lucide="truck" style="width:13px;height:13px"></i>
                        <span th:text="${order.address}"></span>
                    </div>
                    <div class="d-flex align-items-center gap-1">
                        <i data-lucide="credit-card" style="width:13px;height:13px"></i>
                        <span th:text="${order.paymentMethod.displayName}"></span>
                    </div>
                </div>
                <div class="text-end">
                    <div class="text-muted small">Tổng đơn hàng</div>
                    <div class="fw-bold text-danger fs-5"
                         th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT') + ' ₫'}"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
  function showToast(msg) {
    let container = document.getElementById('ws-toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'ws-toast-container';
      container.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast align-items-center text-bg-primary border-0 show';
    toast.setAttribute('role', 'alert');
    toast.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 5000);
  }

  const socket = new SockJS('/ws-chat');
  const stompClient = Stomp.over(socket);
  stompClient.debug = null;
  stompClient.connect({}, function() {
    stompClient.subscribe('/user/queue/order-status', function(frame) {
      const n = JSON.parse(frame.body);
      const card = document.querySelector('[data-order-id="' + n.orderId + '"]');
      if (!card) return;
      const badge = card.querySelector('.status-badge');
      if (badge) {
        badge.className = badge.className.replace(/status-\w+/, 'status-' + n.status);
        badge.textContent = n.displayName;
      }
      showToast('Đơn hàng #' + n.orderId + ': ' + n.displayName);
    });
    stompClient.subscribe('/user/queue/account-status', function(frame) {
      const n = JSON.parse(frame.body);
      if (n.type === 'ACCOUNT_LOCKED') {
        showToast('Tài khoản của bạn đã bị khóa. Đang đăng xuất...');
        setTimeout(function() { window.location = '/logout'; }, 2500);
      }
    });
  });
</script>
<script>lucide.createIcons();</script>
</body>
</html>
