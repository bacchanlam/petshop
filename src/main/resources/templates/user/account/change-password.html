<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi Mật Khẩu - PetShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div th:if="${errorMsg}" class="alert alert-danger">
            ⚠️ <span th:text="${errorMsg}"></span>
          </div>

          <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-warning">
              <h5 class="mb-0" th:if="${hasPassword}">🔒 Đổi Mật Khẩu</h5>
              <h5 class="mb-0" th:unless="${hasPassword}">🔐 Đặt Mật Khẩu</h5>
            </div>
            <div class="card-body p-4">
              <!-- Thông báo cho Google users -->
              <div th:unless="${hasPassword}" class="alert alert-info mb-4">
                ℹ️ Bạn đăng nhập bằng Google. Hãy đặt mật khẩu để có thể đăng
                nhập bằng email.
              </div>

              <form
                th:action="@{/account/change-password}"
                th:object="${changePasswordDTO}"
                method="post"
              >
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />

                <!-- Chỉ hiển thị nếu user có mật khẩu (không phải Google user) -->
                <div class="mb-3" th:if="${hasPassword}">
                  <label class="form-label fw-semibold">
                    Mật khẩu hiện tại <span class="text-danger">*</span>
                  </label>
                  <input
                    type="password"
                    th:field="*{currentPassword}"
                    th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'"
                    class="form-control"
                    placeholder="Nhập mật khẩu hiện tại"
                  />
                  <div
                    class="invalid-feedback"
                    th:errors="*{currentPassword}"
                  ></div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-semibold">
                    Mật khẩu mới <span class="text-danger">*</span>
                  </label>
                  <input
                    type="password"
                    th:field="*{newPassword}"
                    th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                    class="form-control"
                    placeholder="Tối thiểu 6 ký tự"
                  />
                  <div
                    class="invalid-feedback"
                    th:errors="*{newPassword}"
                  ></div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold">
                    Xác nhận mật khẩu mới <span class="text-danger">*</span>
                  </label>
                  <input
                    type="password"
                    th:field="*{confirmPassword}"
                    th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                    class="form-control"
                    placeholder="Nhập lại mật khẩu mới"
                  />
                  <div
                    class="invalid-feedback"
                    th:errors="*{confirmPassword}"
                  ></div>
                </div>

                <div class="d-flex gap-2">
                  <button
                    type="submit"
                    class="btn btn-warning px-4 fw-semibold"
                  >
                    <span th:if="${hasPassword}">Đổi mật khẩu</span>
                    <span th:unless="${hasPassword}">Đặt mật khẩu</span>
                  </button>
                  <a
                    th:href="@{/account/profile}"
                    class="btn btn-outline-secondary px-4"
                    >Hủy</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
