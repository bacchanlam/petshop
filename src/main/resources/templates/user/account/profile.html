<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Cá Nhân - PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <!-- Thông báo -->
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
                ✅ <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
                ⚠️ <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">👤 Thông Tin Cá Nhân</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/account/profile}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên đăng nhập</label>
                            <input type="text" class="form-control bg-light"
                                   th:value="${user.username}" disabled>
                            <small class="text-muted">Không thể thay đổi tên đăng nhập</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control bg-light"
                                   th:value="${user.email}" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Họ và tên <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="fullName" class="form-control"
                                   th:value="${user.fullName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <input type="tel" name="phone" class="form-control"
                                   th:value="${user.phone}" placeholder="0xxxxxxxxx">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Địa chỉ</label>
                            <textarea name="address" class="form-control" rows="3"
                                      placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành"
                                      th:text="${user.address}"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                💾 Lưu thay đổi
                            </button>
                            <a th:href="@{/account/change-password}"
                               class="btn btn-outline-warning px-4">
                                🔒 Đổi mật khẩu
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Links nhanh -->
            <div class="mt-3 text-center">
                <a th:href="@{/orders/history}" class="btn btn-outline-secondary btn-sm">
                    📦 Xem lịch sử đơn hàng
                </a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
