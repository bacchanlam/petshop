<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiết Đơn Hàng - PetShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .status-PENDING   { background:#fff3cd; color:#856404; }
    .status-CONFIRMED { background:#cfe2ff; color:#084298; }
    .status-SHIPPING  { background:#d1ecf1; color:#0c5460; }
    .status-COMPLETED { background:#d4edda; color:#155724; }
    .status-CANCELLED { background:#f8d7da; color:#721c24; }
    .item-img { width:65px; height:65px; object-fit:cover; border-radius:10px; }
    .info-card { border-radius:12px; border:none; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    .timeline { display:flex; justify-content:space-between; position:relative; margin:20px 0; }
    .timeline::before {
        content:''; position:absolute; top:18px; left:0; right:0;
        height:3px; background:#dee2e6; z-index:0;
    }
    .tl-step { flex:1; text-align:center; position:relative; z-index:1; }
    .tl-dot  { width:36px; height:36px; border-radius:50%; margin:0 auto 6px;
               display:flex; align-items:center; justify-content:center;
               font-size:1rem; border:3px solid #dee2e6; background:white; }
    .tl-dot.active   { border-color:#0d6efd; background:#0d6efd; color:white; }
    .tl-dot.done     { border-color:#198754; background:#198754; color:white; }
    .tl-dot.cancelled{ border-color:#dc3545; background:#dc3545; color:white; }
    .tl-label { font-size:.72rem; color:#6c757d; }
    .tl-label.active, .tl-label.done { color:#0d6efd; font-weight:600; }
    .tl-dot svg { width:16px; height:16px; }
  </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
      <li class="breadcrumb-item"><a th:href="@{/orders/history}">Đơn hàng</a></li>
      <li class="breadcrumb-item active">#<span th:text="${order.id}"></span></li>
    </ol>
  </nav>

  <!-- Thông báo -->
  <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show flash-alert d-flex align-items-center gap-2">
    <i data-lucide="check-circle-2" style="width:16px;height:16px;flex-shrink:0"></i>
    <span th:text="${successMsg}"></span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show flash-alert d-flex align-items-center gap-2">
    <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0"></i>
    <span th:text="${errorMsg}"></span>
    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
  </div>

  <div class="row g-4">
    <!-- ===== THÔNG TIN ĐƠN HÀNG ===== -->
    <div class="col-lg-8">

      <!-- Header đơn hàng -->
      <div class="card info-card p-4 mb-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <h5 class="fw-bold mb-1">Đơn hàng #<span th:text="${order.id}"></span></h5>
            <p class="text-muted small mb-0"
               th:text="'Đặt lúc: ' + ${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></p>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span class="badge fs-6 px-3 py-2"
                  th:classappend="'status-' + ${order.status}"
                  th:text="${order.status.displayName}"></span>

            <!-- Nút hủy (chỉ khi PENDING) -->
            <form th:if="${order.status.name() == 'PENDING'}"
                  th:action="@{/orders/{id}/cancel(id=${order.id})}"
                  method="post"
                  onsubmit="return confirm('Bạn có chắc muốn hủy đơn hàng này?')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-outline-danger btn-sm px-3 d-flex align-items-center gap-1">
                <i data-lucide="x-circle" style="width:14px;height:14px"></i>
                Hủy đơn
              </button>
            </form>
          </div>
        </div>

        <!-- Timeline trạng thái -->
        <div class="timeline mt-4" th:unless="${order.status.name() == 'CANCELLED'}">
          <div th:with="s=${order.status.name()}" class="tl-step">
            <div class="tl-dot" th:classappend="${s == 'PENDING'} ? 'active' : 'done'">
              <i data-lucide="check"></i>
            </div>
            <div class="tl-label" th:classappend="${s == 'PENDING'} ? 'active' : 'done'">Chờ xác nhận</div>
          </div>
          <div class="tl-step">
            <div class="tl-dot"
                 th:classappend="${order.status.name() == 'CONFIRMED'} ? 'active' :
                                 (${order.status.name() == 'SHIPPING' or order.status.name() == 'COMPLETED'} ? 'done' : '')">
              <i data-lucide="check"></i>
            </div>
            <div class="tl-label"
                 th:classappend="${order.status.name() == 'CONFIRMED'} ? 'active' :
                                 (${order.status.name() == 'SHIPPING' or order.status.name() == 'COMPLETED'} ? 'done' : '')">Đã xác nhận</div>
          </div>
          <div class="tl-step">
            <div class="tl-dot"
                 th:classappend="${order.status.name() == 'SHIPPING'} ? 'active' :
                                 (${order.status.name() == 'COMPLETED'} ? 'done' : '')">
              <i data-lucide="truck"></i>
            </div>
            <div class="tl-label"
                 th:classappend="${order.status.name() == 'SHIPPING'} ? 'active' :
                                 (${order.status.name() == 'COMPLETED'} ? 'done' : '')">Đang giao</div>
          </div>
          <div class="tl-step">
            <div class="tl-dot"
                 th:classappend="${order.status.name() == 'COMPLETED'} ? 'done' : ''">
              <i data-lucide="check-circle"></i>
            </div>
            <div class="tl-label"
                 th:classappend="${order.status.name() == 'COMPLETED'} ? 'done' : ''">Hoàn thành</div>
          </div>
        </div>

        <!-- Đơn bị hủy -->
        <div th:if="${order.status.name() == 'CANCELLED'}"
             class="alert alert-danger mt-3 mb-0 d-flex align-items-center gap-2">
          <i data-lucide="x-circle" style="width:16px;height:16px;flex-shrink:0"></i>
          Đơn hàng đã bị hủy
        </div>
      </div>

      <!-- Danh sách sản phẩm -->
      <div class="card info-card p-0 mb-4 overflow-hidden">
        <div class="card-header bg-white fw-semibold px-4 py-3 d-flex align-items-center gap-2">
          <i data-lucide="package" style="width:16px;height:16px;color:#6c757d"></i>
          Sản phẩm đã đặt
        </div>
        <div th:each="item, stat : ${order.orderItems}">
          <hr th:if="${!stat.first}" class="my-0 mx-3">
          <div class="d-flex gap-3 align-items-center p-3">
            <img th:if="${item.productImg != null}"
                 th:src="@{'/uploads/products/' + ${item.productImg}}"
                 class="item-img" alt="ảnh">
            <img th:unless="${item.productImg != null}"
                 src="/images/no-image.png" class="item-img" alt="no image">
            <div class="flex-grow-1">
              <p class="fw-semibold mb-1" th:text="${item.productName}"></p>
              <small class="text-muted">
                Đơn giá: <span th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT') + ' ₫'}"></span>
                × <span th:text="${item.quantity}"></span>
              </small>
            </div>
            <div class="fw-bold text-danger"
                 th:text="${#numbers.formatDecimal(item.subTotal,0,'COMMA',0,'POINT') + ' ₫'}"></div>
          </div>
        </div>
        <div class="card-footer bg-white d-flex justify-content-between align-items-center px-4 py-3">
          <span class="fw-bold">Tổng cộng</span>
          <span class="fw-bold fs-5 text-danger"
                th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT') + ' ₫'}"></span>
        </div>
      </div>
    </div>

    <!-- ===== THÔNG TIN GIAO HÀNG & THANH TOÁN ===== -->
    <div class="col-lg-4">
      <div class="card info-card p-4 mb-3">
        <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
          <i data-lucide="map-pin" style="width:16px;height:16px;color:#6c757d"></i>
          Thông tin giao hàng
        </h6>
        <div class="mb-2">
          <small class="text-muted">Người nhận</small>
          <p class="fw-semibold mb-0" th:text="${order.fullName}"></p>
        </div>
        <div class="mb-2">
          <small class="text-muted">Số điện thoại</small>
          <p class="fw-semibold mb-0" th:text="${order.phone}"></p>
        </div>
        <div class="mb-2">
          <small class="text-muted">Địa chỉ</small>
          <p class="fw-semibold mb-0" th:text="${order.address}"></p>
        </div>
        <div th:if="${order.note != null and !order.note.isBlank()}">
          <small class="text-muted">Ghi chú</small>
          <p class="mb-0 fst-italic" th:text="${order.note}"></p>
        </div>
      </div>

      <div class="card info-card p-4">
        <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
          <i data-lucide="credit-card" style="width:16px;height:16px;color:#6c757d"></i>
          Thanh toán
        </h6>
        <div class="d-flex justify-content-between mb-2">
          <span class="text-muted">Phương thức</span>
          <span class="fw-semibold" th:text="${order.paymentMethod.displayName}"></span>
        </div>
        <div class="d-flex justify-content-between">
          <span class="text-muted">Tổng tiền</span>
          <span class="fw-bold text-danger"
                th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT') + ' ₫'}"></span>
        </div>
      </div>

      <a th:href="@{/orders/history}" class="btn btn-outline-secondary w-100 mt-3 d-flex align-items-center justify-content-center gap-2">
        <i data-lucide="arrow-left" style="width:15px;height:15px"></i>
        Về lịch sử đơn hàng
      </a>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
  /*<![CDATA[*/
  const ORDER_ID = /*[[${order.id}]]*/ 0;

  const STATUS_LABELS = {
    PENDING:   'Chờ xác nhận',
    CONFIRMED: 'Đã xác nhận',
    SHIPPING:  'Đang giao hàng',
    COMPLETED: 'Hoàn thành',
    CANCELLED: 'Đã hủy'
  };

  function updateOrderDetailUI(notification) {
    if (notification.orderId !== ORDER_ID) return;

    const s = notification.status;
    const label = notification.displayName || STATUS_LABELS[s] || s;

    // Cập nhật badge trạng thái
    const badge = document.querySelector('.badge[class*="status-"]');
    if (badge) {
      badge.className = badge.className.replace(/status-\w+/, 'status-' + s);
      badge.textContent = label;
    }

    // Ẩn/hiện nút hủy
    const cancelForm = document.querySelector('form[action*="/cancel"]');
    if (cancelForm) cancelForm.style.display = (s === 'PENDING') ? '' : 'none';

    // Cập nhật timeline
    const timeline = document.querySelector('.timeline');
    const cancelAlert = document.querySelector('.alert-danger:not(.alert-dismissible)');

    if (s === 'CANCELLED') {
      if (timeline) timeline.style.display = 'none';
      if (!cancelAlert) {
        const div = document.createElement('div');
        div.className = 'alert alert-danger mt-3 mb-0 d-flex align-items-center gap-2 realtime-cancel-alert';
        div.innerHTML = '<span>Đơn hàng đã bị hủy</span>';
        timeline && timeline.parentNode.appendChild(div);
      }
    } else {
      if (timeline) timeline.style.display = '';
      const existingAlert = document.querySelector('.realtime-cancel-alert');
      if (existingAlert) existingAlert.remove();

      const steps = timeline ? timeline.querySelectorAll('.tl-step') : [];
      const order = ['PENDING','CONFIRMED','SHIPPING','COMPLETED'];
      const cur = order.indexOf(s);

      steps.forEach((step, i) => {
        const dot = step.querySelector('.tl-dot');
        const lbl = step.querySelector('.tl-label');
        if (!dot || !lbl) return;
        dot.className = dot.className.replace(/\b(active|done|cancelled)\b/g, '').trim();
        lbl.className = lbl.className.replace(/\b(active|done)\b/g, '').trim();
        if (i < cur) {
          dot.classList.add('done'); lbl.classList.add('done');
        } else if (i === cur) {
          dot.classList.add('active'); lbl.classList.add('active');
        }
      });
    }

    // Toast thông báo
    showToast('Đơn hàng #' + ORDER_ID + ': ' + label);

    lucide.createIcons();
  }

  function showToast(msg) {
    let container = document.getElementById('ws-toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'ws-toast-container';
      container.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast align-items-center text-bg-primary border-0 show';
    toast.setAttribute('role', 'alert');
    toast.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 5000);
  }

  // Kết nối WebSocket
  const socket = new SockJS('/ws-chat');
  const stompClient = Stomp.over(socket);
  stompClient.debug = null;
  stompClient.connect({}, function() {
    stompClient.subscribe('/user/queue/order-status', function(frame) {
      const notification = JSON.parse(frame.body);
      updateOrderDetailUI(notification);
    });
    stompClient.subscribe('/user/queue/account-status', function(frame) {
      const n = JSON.parse(frame.body);
      if (n.type === 'ACCOUNT_LOCKED') {
        showToast('Tài khoản của bạn đã bị khóa. Đang đăng xuất...');
        setTimeout(function() { window.location = '/logout'; }, 2500);
      }
    });
  });
  /*]]>*/
</script>
<script>
  lucide.createIcons();
  document.querySelectorAll('.flash-alert').forEach(alert => {
      setTimeout(() => {
          alert.style.transition = 'opacity 0.5s, transform 0.5s';
          alert.style.opacity = '0';
          alert.style.transform = 'translateY(-10px)';
          setTimeout(() => alert.remove(), 500);
      }, 5000);
  });
</script>
</body>
</html>
