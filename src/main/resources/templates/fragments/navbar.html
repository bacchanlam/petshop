<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <style>
      .search-input::placeholder {
        color: rgba(255, 255, 255, 0.7);
      }
      .search-input:focus {
        background: rgba(255, 255, 255, 0.25) !important;
        border-color: #f5a623 !important;
        box-shadow: none;
        color: #fff !important;
      }
      .search-btn:hover {
        background: #d4891a !important;
        border-color: #d4891a !important;
      }
      .navbar {
        transition:
          transform 0.35s ease,
          box-shadow 0.35s ease;
        will-change: transform;
      }
      .navbar.navbar-hidden {
        transform: translateY(-100%);
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <!-- ======= NAVBAR ======= -->
    <nav
      th:fragment="navbar"
      class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow"
    >
      <div class="container">
        <!-- Logo -->
        <a class="navbar-brand fw-bold fs-4" th:href="@{/}"> PetShop </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarMain"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
          <!-- Menu trái -->
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}">Trang Chủ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/products}">Sản Phẩm</a>
            </li>
          </ul>

          <!-- Tìm kiếm -->
          <form class="d-flex me-3" th:action="@{/products}" method="get">
            <div class="input-group" style="width: 260px">
              <input
                class="form-control search-input"
                type="search"
                name="keyword"
                placeholder="Tìm sản phẩm..."
                style="
                  border-radius: 6px 0 0 6px;
                  border: 2px solid rgba(255, 255, 255, 0.35);
                  background: rgba(255, 255, 255, 0.15);
                  color: #fff;
                  font-size: 0.9rem;
                  padding: 6px 12px;
                "
              />
              <button
                class="btn search-btn"
                type="submit"
                style="
                  background: #f5a623;
                  border: 2px solid #f5a623;
                  border-radius: 0 6px 6px 0;
                  padding: 6px 14px;
                  color: #fff;
                  transition:
                    background 0.2s,
                    border-color 0.2s;
                "
              >
                <!-- Lucide: Search -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
              </button>
            </div>
          </form>

          <!-- Menu phải -->
          <ul class="navbar-nav">
            <!-- Chưa đăng nhập -->
            <li class="nav-item" sec:authorize="isAnonymous()">
              <a class="nav-link" th:href="@{/auth/login}">Đăng nhập</a>
            </li>
            <li class="nav-item" sec:authorize="isAnonymous()">
              <a class="nav-link" th:href="@{/auth/register}">Đăng ký</a>
            </li>

            <!-- Đã đăng nhập: Giỏ hàng -->
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <a
                class="nav-link position-relative d-flex align-items-center gap-1"
                th:href="@{/cart}"
              >
                <!-- Lucide: ShoppingCart -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="9" cy="21" r="1" />
                  <circle cx="20" cy="21" r="1" />
                  <path
                    d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                  />
                </svg>
                Giỏ hàng
                <span
                  class="badge bg-danger rounded-pill cart-count"
                  id="cartCount"
                  >0</span
                >
              </a>
            </li>

            <!-- Đã đăng nhập: Dropdown tài khoản -->
            <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
              <a
                class="nav-link dropdown-toggle d-flex align-items-center gap-1"
                href="#"
                data-bs-toggle="dropdown"
              >
                <!-- Lucide: User -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                <span sec:authentication="name"></span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    th:href="@{/account/profile}"
                  >
                    <!-- Lucide: UserCircle -->
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M18 20a6 6 0 0 0-12 0" />
                      <circle cx="12" cy="10" r="4" />
                      <circle cx="12" cy="12" r="10" />
                    </svg>
                    Thông tin cá nhân
                  </a>
                </li>
                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    th:href="@{/orders/history}"
                  >
                    <!-- Lucide: ClipboardList -->
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <rect x="9" y="2" width="6" height="4" rx="1" ry="1" />
                      <path
                        d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                      />
                      <line x1="9" y1="12" x2="15" y2="12" />
                      <line x1="9" y1="16" x2="13" y2="16" />
                    </svg>
                    Lịch sử đơn hàng
                  </a>
                </li>
                <!-- Chỉ hiện với Admin -->
                <li sec:authorize="hasRole('ADMIN')">
                  <hr class="dropdown-divider" />
                </li>
                <li sec:authorize="hasRole('ADMIN')">
                  <a
                    class="dropdown-item text-danger fw-bold d-flex align-items-center gap-2"
                    th:href="@{/admin/dashboard}"
                  >
                    <!-- Lucide: Settings -->
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <circle cx="12" cy="12" r="3" />
                      <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                      />
                    </svg>
                    Quản trị Admin
                  </a>
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a
                    class="dropdown-item text-danger d-flex align-items-center gap-2"
                    th:href="@{/auth/logout}"
                    onclick="
                      window.__psIsLoggingOut = true;
                      if (window.psDoLogout) {
                        window.psDoLogout();
                      }
                    "
                  >
                    <!-- Lucide: LogOut -->
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                      <polyline points="16 17 21 12 16 7" />
                      <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Đăng xuất
                  </a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          var navbar = document.querySelector(".navbar");
          if (!navbar) return;
          navbar.style.transition = "transform 0.35s ease";
          var lastScrollY = window.scrollY;
          window.addEventListener(
            "scroll",
            function () {
              var currentScrollY = window.scrollY;
              if (currentScrollY > lastScrollY && currentScrollY > 60) {
                navbar.style.transform = "translateY(-100%)";
              } else {
                navbar.style.transform = "translateY(0)";
              }
              lastScrollY = currentScrollY;
            },
            { passive: true },
          );
        });
      </script>
    </nav>
  </body>
</html>
