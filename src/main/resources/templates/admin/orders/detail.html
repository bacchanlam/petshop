<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiết Đơn Hàng - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .info-card { border-radius:12px; border:none; box-shadow:0 2px 10px rgba(0,0,0,.08); }
    .item-img  { width:60px; height:60px; object-fit:cover; border-radius:8px; }
    .status-PENDING   { background:#fff3cd; color:#856404; }
    .status-CONFIRMED { background:#cfe2ff; color:#084298; }
    .status-SHIPPING  { background:#d1ecf1; color:#0c5460; }
    .status-COMPLETED { background:#d4edda; color:#155724; }
    .status-CANCELLED { background:#f8d7da; color:#721c24; }
  </style>
</head>
<body class="bg-light">
<div class="d-flex">

  <div th:replace="~{fragments/admin-sidebar :: sidebar}" th:with="activePage='orders'"></div>

  <div class="flex-grow-1 p-4">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a th:href="@{/admin/orders}" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1">
        <i data-lucide="arrow-left" style="width:14px;height:14px"></i>
        Quay lại
      </a>
      <h4 class="mb-0 fw-bold">
        Đơn hàng #<span th:text="${order.id}"></span>
      </h4>
      <span class="badge fs-6 px-3 py-2 ms-1"
            th:classappend="'status-' + ${order.status}"
            th:text="${order.status.displayName}"></span>
    </div>

    <!-- Thông báo -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show flash-alert d-flex align-items-center gap-2">
      <i data-lucide="check-circle-2" style="width:16px;height:16px;flex-shrink:0"></i>
      <span th:text="${successMsg}"></span>
      <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show flash-alert d-flex align-items-center gap-2">
      <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0"></i>
      <span th:text="${errorMsg}"></span>
      <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
      <!-- ===== LEFT ===== -->
      <div class="col-lg-8">

        <!-- Sản phẩm -->
        <div class="card info-card mb-4">
          <div class="card-header bg-white fw-semibold d-flex align-items-center gap-2">
            <i data-lucide="package" style="width:16px;height:16px;color:#6c757d"></i>
            Sản phẩm
          </div>
          <div th:each="item, stat : ${order.orderItems}">
            <hr th:if="${!stat.first}" class="my-0 mx-3">
            <div class="d-flex gap-3 align-items-center p-3">
              <img th:if="${item.productImg != null}"
                   th:src="@{'/uploads/products/' + ${item.productImg}}"
                   class="item-img" alt="">
              <img th:unless="${item.productImg != null}"
                   src="/images/no-image.png" class="item-img" alt="">
              <div class="flex-grow-1">
                <div class="fw-semibold" th:text="${item.productName}"></div>
                <small class="text-muted">
                  <span th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT') + ' ₫'}"></span>
                  × <span th:text="${item.quantity}"></span>
                </small>
              </div>
              <div class="fw-bold text-danger"
                   th:text="${#numbers.formatDecimal(item.subTotal,0,'COMMA',0,'POINT') + ' ₫'}"></div>
            </div>
          </div>
          <div class="card-footer bg-white d-flex justify-content-between fw-bold px-4">
            <span>Tổng cộng</span>
            <span class="text-danger fs-5"
                  th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT') + ' ₫'}"></span>
          </div>
        </div>

        <!-- Cập nhật trạng thái -->
        <div class="card info-card p-4"
             th:unless="${order.status.name() == 'COMPLETED' or order.status.name() == 'CANCELLED'}">
          <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
            <i data-lucide="refresh-cw" style="width:16px;height:16px;color:#6c757d"></i>
            Cập nhật trạng thái
          </h6>
          <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post"
                class="d-flex gap-3 align-items-center">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <select name="status" class="form-select" style="max-width:240px;">
              <option th:each="s : ${statuses}"
                      th:value="${s}"
                      th:text="${s.displayName}"
                      th:selected="${s == order.status}"></option>
            </select>
            <button type="submit" class="btn btn-primary px-4 fw-semibold d-flex align-items-center gap-2">
              <i data-lucide="check" style="width:15px;height:15px"></i>
              Cập nhật
            </button>
          </form>
        </div>
      </div>

      <!-- ===== RIGHT ===== -->
      <div class="col-lg-4">
        <!-- Khách hàng -->
        <div class="card info-card p-4 mb-3">
          <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
            <i data-lucide="circle-user" style="width:16px;height:16px;color:#6c757d"></i>
            Thông tin khách hàng
          </h6>
          <p class="mb-1"><strong th:text="${order.user.fullName ?: order.user.username}"></strong></p>
          <p class="mb-1 small text-muted" th:text="${order.user.email}"></p>
          <hr>
          <h6 class="fw-semibold mb-2 small d-flex align-items-center gap-2">
            <i data-lucide="map-pin" style="width:14px;height:14px;color:#6c757d"></i>
            Địa chỉ giao hàng
          </h6>
          <p class="mb-1 small"><strong>Người nhận:</strong> <span th:text="${order.fullName}"></span></p>
          <p class="mb-1 small"><strong>SĐT:</strong> <span th:text="${order.phone}"></span></p>
          <p class="mb-1 small"><strong>Địa chỉ:</strong> <span th:text="${order.address}"></span></p>
          <p class="mb-0 small" th:if="${order.note != null and !order.note.isBlank()}">
            <strong>Ghi chú:</strong> <em th:text="${order.note}"></em>
          </p>
        </div>

        <!-- Thanh toán -->
        <div class="card info-card p-4">
          <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
            <i data-lucide="credit-card" style="width:16px;height:16px;color:#6c757d"></i>
            Thanh toán
          </h6>
          <div class="d-flex justify-content-between mb-2 small">
            <span class="text-muted">Phương thức</span>
            <span class="fw-semibold" th:text="${order.paymentMethod.displayName}"></span>
          </div>
          <div class="d-flex justify-content-between small">
            <span class="text-muted">Ngày đặt</span>
            <span th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></span>
          </div>
          <hr>
          <div class="d-flex justify-content-between">
            <span class="fw-bold">Tổng tiền</span>
            <span class="fw-bold text-danger"
                  th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT') + ' ₫'}"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  lucide.createIcons();
  document.querySelectorAll('.flash-alert').forEach(alert => {
      setTimeout(() => {
          alert.style.transition = 'opacity 0.5s, transform 0.5s';
          alert.style.opacity = '0';
          alert.style.transform = 'translateY(-10px)';
          setTimeout(() => alert.remove(), 500);
      }, 5000);
  });
</script>
</body>
</html>
