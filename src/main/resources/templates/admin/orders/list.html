<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .stat-mini { border-radius:10px; padding:12px 16px; text-align:center; cursor:pointer; transition:.2s; }
        .stat-mini:hover { opacity:.85; }
        .status-PENDING   { background:#fff3cd; color:#856404; }
        .status-CONFIRMED { background:#cfe2ff; color:#084298; }
        .status-SHIPPING  { background:#d1ecf1; color:#0c5460; }
        .status-COMPLETED { background:#d4edda; color:#155724; }
        .status-CANCELLED { background:#f8d7da; color:#721c24; }
        .status-badge { font-size:.78rem; padding:4px 10px; border-radius:20px; font-weight:600; }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">

    <div th:replace="~{fragments/admin-sidebar :: sidebar}" th:with="activePage='orders'"></div>

    <div class="flex-grow-1 p-4">
        <h4 class="fw-bold mb-4 d-flex align-items-center gap-2">
            <i data-lucide="shopping-bag" style="width:22px;height:22px;color:#0d6efd"></i>
            Quản Lý Đơn Hàng
        </h4>

        <!-- Thông báo -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2">
            <i data-lucide="check-circle-2" style="width:16px;height:16px;flex-shrink:0"></i>
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>

        <!-- Thống kê nhanh -->
        <div class="row g-3 mb-4">
            <div class="col">
                <a th:href="@{/admin/orders(status='PENDING')}" class="text-decoration-none">
                    <div class="stat-mini status-PENDING">
                        <div class="fw-bold fs-4" id="cntPending" th:text="${cntPending}">0</div>
                        <small>Chờ xác nhận</small>
                    </div>
                </a>
            </div>
            <div class="col">
                <a th:href="@{/admin/orders(status='CONFIRMED')}" class="text-decoration-none">
                    <div class="stat-mini status-CONFIRMED">
                        <div class="fw-bold fs-4" th:text="${cntConfirmed}">0</div>
                        <small>Đã xác nhận</small>
                    </div>
                </a>
            </div>
            <div class="col">
                <a th:href="@{/admin/orders(status='SHIPPING')}" class="text-decoration-none">
                    <div class="stat-mini status-SHIPPING">
                        <div class="fw-bold fs-4" th:text="${cntShipping}">0</div>
                        <small>Đang giao</small>
                    </div>
                </a>
            </div>
            <div class="col">
                <a th:href="@{/admin/orders(status='COMPLETED')}" class="text-decoration-none">
                    <div class="stat-mini status-COMPLETED">
                        <div class="fw-bold fs-4" th:text="${cntCompleted}">0</div>
                        <small>Hoàn thành</small>
                    </div>
                </a>
            </div>
            <div class="col">
                <a th:href="@{/admin/orders(status='CANCELLED')}" class="text-decoration-none">
                    <div class="stat-mini status-CANCELLED">
                        <div class="fw-bold fs-4" id="cntCancelled" th:text="${cntCancelled}">0</div>
                        <small>Đã hủy</small>
                    </div>
                </a>
            </div>
        </div>

        <!-- Bộ lọc -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form th:action="@{/admin/orders}" method="get" class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small fw-semibold">Tìm kiếm</label>
                        <input type="text" name="keyword" class="form-control"
                               placeholder="Tên, SĐT khách hàng..." th:value="${keyword}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Trạng thái</label>
                        <select name="status" class="form-select">
                            <option value="">-- Tất cả --</option>
                            <option th:each="s : ${statuses}"
                                    th:value="${s}"
                                    th:text="${s.displayName}"
                                    th:selected="${s == selStatus}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
                            <i data-lucide="search" style="width:15px;height:15px"></i>
                            Lọc
                        </button>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/admin/orders}" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                            <i data-lucide="rotate-ccw" style="width:15px;height:15px"></i>
                            Reset
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Bảng đơn hàng -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white d-flex justify-content-between">
                <span class="fw-semibold d-flex align-items-center gap-2">
                    <i data-lucide="scroll-text" style="width:16px;height:16px;color:#6c757d"></i>
                    Danh Sách Đơn Hàng
                </span>
                <span class="text-muted small">
                    Tổng: <strong th:text="${orders.totalElements}">0</strong>
                </span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Khách hàng</th>
                        <th>Số SP</th>
                        <th>Tổng tiền</th>
                        <th>Thanh toán</th>
                        <th>Trạng thái</th>
                        <th>Ngày đặt</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="o : ${orders}" th:attr="data-order-id=${o.id}">
                        <td class="fw-semibold">#<span th:text="${o.id}"></span></td>
                        <td>
                            <div class="fw-semibold" th:text="${o.fullName}"></div>
                            <small class="text-muted" th:text="${o.phone}"></small>
                        </td>
                        <td>
                            <span class="badge bg-info"
                                  th:text="${o.orderItems.size()}"></span>
                        </td>
                        <td class="fw-bold text-danger"
                            th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT') + ' ₫'}"></td>
                        <td>
                            <span class="badge bg-light text-dark border small"
                                  th:text="${o.paymentMethod.displayName}"></span>
                        </td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="'status-' + ${o.status}"
                                  th:text="${o.status.displayName}"></span>
                        </td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy')}"></td>
                        <td>
                            <a th:href="@{/admin/orders/{id}(id=${o.id})}"
                               class="btn btn-sm btn-outline-primary d-inline-flex align-items-center gap-1">
                                <i data-lucide="eye" style="width:14px;height:14px"></i>
                                Chi tiết
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${orders.empty}">
                        <td colspan="8" class="text-center text-muted py-4">
                            Không có đơn hàng nào
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Phân trang -->
            <div class="card-footer bg-white d-flex justify-content-center" th:if="${totalPages > 1}">
                <nav>
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/orders(page=${currentPage-1},status=${selStatus},keyword=${keyword})}">&laquo;</a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            class="page-item" th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{/admin/orders(page=${i},status=${selStatus},keyword=${keyword})}"
                               th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages-1} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/orders(page=${currentPage+1},status=${selStatus},keyword=${keyword})}">&raquo;</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>lucide.createIcons();</script>

<!-- Real-time admin notifications -->
<div id="adminToastContainer" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;min-width:320px;max-width:400px;"></div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
(function () {
    var toastContainer = document.getElementById('adminToastContainer');

    function esc(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtMoney(amount) {
        if (!amount) return '0';
        return Number(amount).toLocaleString('vi-VN');
    }

    function showToast(notif) {
        var icons  = { NEW_ORDER: '🛒', ORDER_CANCELLED: '❌', NEW_REVIEW: '⭐' };
        var colors = { NEW_ORDER: '#198754', ORDER_CANCELLED: '#dc3545', NEW_REVIEW: '#0d6efd' };
        var icon   = icons[notif.type]  || '🔔';
        var color  = colors[notif.type] || '#6c757d';

        var link = '';
        if (notif.type === 'NEW_ORDER' || notif.type === 'ORDER_CANCELLED') {
            link = '<a href="/admin/orders/' + notif.entityId
                 + '" class="btn btn-sm btn-light border mt-2 w-100">Xem đơn hàng</a>';
        } else if (notif.type === 'NEW_REVIEW') {
            link = '<a href="/admin/products" class="btn btn-sm btn-light border mt-2 w-100">Xem sản phẩm</a>';
        }

        var toast = document.createElement('div');
        toast.style.cssText = 'background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);'
            + 'padding:14px 16px;border-left:4px solid ' + color + ';animation:slideIn .3s ease;';
        toast.innerHTML =
            '<div style="display:flex;align-items:flex-start;gap:10px">'
            + '<span style="font-size:1.3rem;line-height:1">' + icon + '</span>'
            + '<div style="flex:1"><div style="font-weight:600;font-size:.85rem;color:#212529;margin-bottom:3px">'
            + esc(notif.message) + '</div>' + link + '</div>'
            + '<button onclick="this.closest(\'div[data-toast]\').remove()" '
            + 'style="background:none;border:none;font-size:1rem;color:#aaa;cursor:pointer;padding:0;line-height:1">✕</button>'
            + '</div>';
        toast.setAttribute('data-toast','1');
        toastContainer.prepend(toast);
        setTimeout(function () { if (toast.parentNode) toast.remove(); }, 8000);
    }

    function updateCount(id, delta) {
        var el = document.getElementById(id);
        if (el) el.textContent = Math.max(0, parseInt(el.textContent || '0') + delta);
    }

    // Thêm row mới vào đầu bảng khi có đơn hàng mới
    function prependOrderRow(notif) {
        var tbody = document.querySelector('table tbody');
        if (!tbody) return;

        // Xoá dòng "Không có đơn hàng" nếu có
        var emptyRow = tbody.querySelector('tr td[colspan]');
        if (emptyRow) emptyRow.closest('tr').remove();

        var tr = document.createElement('tr');
        tr.setAttribute('data-order-id', notif.entityId);
        tr.style.animation = 'rowFadeIn .5s ease';
        tr.innerHTML =
            '<td class="fw-semibold">#' + notif.entityId + '</td>'
            + '<td><div class="fw-semibold">' + esc(notif.customerName) + '</div>'
            + '<small class="text-muted">' + esc(notif.customerPhone) + '</small></td>'
            + '<td><span class="badge bg-info">' + (notif.itemCount || '?') + '</span></td>'
            + '<td class="fw-bold text-danger">' + fmtMoney(notif.totalAmount) + ' ₫</td>'
            + '<td><span class="badge bg-light text-dark border small">'
            + esc(notif.paymentMethodDisplay) + '</span></td>'
            + '<td><span class="status-badge status-' + (notif.statusKey || 'PENDING') + '">'
            + esc(notif.statusDisplay) + '</span></td>'
            + '<td class="small text-muted">' + esc(notif.dateStr) + '</td>'
            + '<td><a href="/admin/orders/' + notif.entityId
            + '" class="btn btn-sm btn-outline-primary d-inline-flex align-items-center gap-1">'
            + '<i data-lucide="eye" style="width:14px;height:14px"></i> Chi tiết</a></td>';

        tbody.prepend(tr);
        lucide.createIcons();
    }

    // Cập nhật status badge của row khi đơn bị hủy
    function updateOrderStatus(orderId, newStatus, displayName) {
        var row = document.querySelector('tr[data-order-id="' + orderId + '"]');
        if (!row) return;
        var badge = row.querySelector('.status-badge');
        if (!badge) return;
        badge.className = 'status-badge status-' + newStatus;
        badge.textContent = displayName;
    }

    function connect() {
        var sock  = new SockJS('/ws-chat');
        var stomp = Stomp.over(sock);
        stomp.debug = null;

        stomp.connect({}, function () {
            stomp.subscribe('/topic/admin-updates', function (frame) {
                var notif = JSON.parse(frame.body);
                showToast(notif);

                if (notif.type === 'NEW_ORDER') {
                    updateCount('cntPending', 1);
                    prependOrderRow(notif);
                } else if (notif.type === 'ORDER_CANCELLED') {
                    updateCount('cntPending', -1);
                    updateCount('cntCancelled', 1);
                    updateOrderStatus(notif.entityId, 'CANCELLED', 'Đã hủy');
                }
            });
        }, function () {
            setTimeout(connect, 5000);
        });
    }

    var style = document.createElement('style');
    style.textContent = '@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}'
        + '@keyframes rowFadeIn{from{opacity:0;background:#d4edda}to{opacity:1;background:transparent}}';
    document.head.appendChild(style);

    connect();
})();
</script>
</body>
</html>
