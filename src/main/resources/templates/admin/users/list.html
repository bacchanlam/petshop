<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Người Dùng - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-light">
<div class="d-flex">

  <div th:replace="~{fragments/admin-sidebar :: sidebar}" th:with="activePage='users'"></div>

  <div class="flex-grow-1 p-4">
    <h4 class="fw-bold mb-4 d-flex align-items-center gap-2">
      <i data-lucide="users" style="width:22px;height:22px;color:#0d6efd"></i>
      Quản Lý Người Dùng
    </h4>

    <!-- Thông báo -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2">
      <i data-lucide="check-circle-2" style="width:16px;height:16px;flex-shrink:0"></i>
      <span th:text="${successMsg}"></span>
      <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2">
      <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0"></i>
      <span th:text="${errorMsg}"></span>
      <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <span class="fw-semibold d-flex align-items-center gap-2">
          <i data-lucide="list" style="width:16px;height:16px;color:#6c757d"></i>
          Danh Sách Tài Khoản
        </span>
        <span class="badge bg-primary" th:text="${users.size() + ' tài khoản'}"></span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Tài khoản</th>
            <th>Họ tên</th>
            <th>Email</th>
            <th>SĐT</th>
            <th>Quyền</th>
            <th>Trạng thái</th>
            <th>Ngày tạo</th>
            <th>Thao tác</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="u, stat : ${users}">
            <td class="text-muted small" th:text="${stat.index + 1}"></td>
            <td>
              <div class="fw-semibold" th:text="${u.username}"></div>
            </td>
            <td th:text="${u.fullName ?: '-'}"></td>
            <td>
              <small th:text="${u.email}"></small>
            </td>
            <td>
              <small th:text="${u.phone ?: '-'}"></small>
            </td>
            <td>
              <span th:each="role : ${u.roles}"
                    th:text="${role.name == 'ROLE_ADMIN'} ? 'Admin' : 'User'"
                    th:classappend="${role.name == 'ROLE_ADMIN'} ? 'bg-danger' : 'bg-primary'"
                    class="badge me-1"></span>
            </td>
            <td>
              <span th:if="${u.enabled}"    class="badge bg-success">Hoạt động</span>
              <span th:unless="${u.enabled}" class="badge bg-secondary">Bị khóa</span>
            </td>
            <td>
              <small class="text-muted"
                     th:text="${#temporals.format(u.createdAt,'dd/MM/yyyy')}"></small>
            </td>
            <td>
              <div class="d-flex gap-1 flex-wrap">
                <!-- Khóa / Mở khóa -->
                <form th:action="@{/admin/users/toggle/{id}(id=${u.id})}"
                      method="post" class="d-inline">
                  <input type="hidden" th:name="${_csrf.parameterName}"
                         th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-sm"
                          th:classappend="${u.enabled} ? 'btn-outline-warning' : 'btn-outline-success'"
                          th:title="${u.enabled} ? 'Khóa' : 'Mở khóa'">
                    <i th:attr="data-lucide=${u.enabled} ? 'lock' : 'lock-open'"
                       style="width:14px;height:14px"></i>
                  </button>
                </form>

                <!-- Đổi quyền (không cho đổi quyền chính mình) -->
                <div class="dropdown" th:unless="${u.username == 'admin'}">
                  <button class="btn btn-sm btn-outline-secondary dropdown-toggle d-flex align-items-center gap-1"
                          data-bs-toggle="dropdown">
                    <i data-lucide="settings-2" style="width:14px;height:14px"></i>
                  </button>
                  <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                      <form th:action="@{/admin/users/role/{id}(id=${u.id})}"
                            method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <input type="hidden" name="roleName" value="ROLE_ADMIN"/>
                        <button type="submit" class="dropdown-item text-danger d-flex align-items-center gap-2">
                          <i data-lucide="shield-check" style="width:14px;height:14px"></i>
                          Cấp quyền Admin
                        </button>
                      </form>
                    </li>
                    <li>
                      <form th:action="@{/admin/users/role/{id}(id=${u.id})}"
                            method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <input type="hidden" name="roleName" value="ROLE_USER"/>
                        <button type="submit" class="dropdown-item d-flex align-items-center gap-2">
                          <i data-lucide="user" style="width:14px;height:14px"></i>
                          Hạ xuống User
                        </button>
                      </form>
                    </li>
                  </ul>
                </div>
              </div>
            </td>
          </tr>
          <tr th:if="${users.empty}">
            <td colspan="9" class="text-center text-muted py-4">
              Chưa có người dùng nào
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
