<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Danh Mục - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-light">
<div class="d-flex">

    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: sidebar}" th:with="activePage='categories'"></div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 fw-bold d-flex align-items-center gap-2">
                <i data-lucide="folder-open" style="width:22px;height:22px;color:#0d6efd"></i>
                Quản Lý Danh Mục
            </h4>
        </div>

        <!-- Thông báo -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2">
            <i data-lucide="check-circle-2" style="width:16px;height:16px;flex-shrink:0"></i>
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2">
            <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0"></i>
            <span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">
            <!-- Form thêm nhanh -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white fw-semibold d-flex align-items-center gap-2">
                        <i data-lucide="plus-circle" style="width:16px;height:16px"></i>
                        Thêm Danh Mục Mới
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/categories/add}"
                              th:object="${newCategory}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Tên danh mục <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{name}" class="form-control"
                                       placeholder="VD: Thức ăn cho chó" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mô tả</label>
                                <textarea th:field="*{description}" class="form-control"
                                          rows="3" placeholder="Mô tả ngắn..."></textarea>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox"
                                       th:field="*{visible}" id="visible" checked>
                                <label class="form-check-label" for="visible">Hiển thị</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
                                <i data-lucide="plus" style="width:15px;height:15px"></i>
                                Thêm Danh Mục
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Bảng danh mục -->
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-semibold border-bottom d-flex align-items-center gap-2">
                        <i data-lucide="list" style="width:16px;height:16px;color:#6c757d"></i>
                        Danh Sách Danh Mục
                        <span class="badge bg-primary ms-1"
                              th:text="${categories.size()}">0</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Tên danh mục</th>
                                <th>Mô tả</th>
                                <th>Số SP</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="cat, stat : ${categories}">
                                <td th:text="${stat.index + 1}"></td>
                                <td class="fw-semibold" th:text="${cat.name}"></td>
                                <td class="text-muted small"
                                    th:text="${#strings.abbreviate(cat.description ?: '', 50)}"></td>
                                <td>
                                    <span class="badge bg-info"
                                          th:text="${cat.products != null ? cat.products.size() : 0}">0</span>
                                </td>
                                <td>
                                    <span th:if="${cat.visible}"
                                          class="badge bg-success">Hiển thị</span>
                                    <span th:unless="${cat.visible}"
                                          class="badge bg-secondary">Đã ẩn</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <!-- Sửa -->
                                        <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                           class="btn btn-sm btn-outline-primary">
                                            <i data-lucide="pencil" style="width:14px;height:14px"></i>
                                        </a>

                                        <!-- Ẩn/Hiện -->
                                        <form th:action="@{/admin/categories/toggle/{id}(id=${cat.id})}"
                                              method="post" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                   th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm"
                                                    th:classappend="${cat.visible} ? 'btn-outline-warning' : 'btn-outline-success'"
                                                    th:title="${cat.visible} ? 'Ẩn' : 'Hiện'">
                                                <i th:attr="data-lucide=${cat.visible} ? 'eye-off' : 'eye'"
                                                   style="width:14px;height:14px"></i>
                                            </button>
                                        </form>

                                        <!-- Xóa -->
                                        <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Xóa danh mục này?')">
                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                   th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i data-lucide="trash-2" style="width:14px;height:14px"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${categories.empty}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    Chưa có danh mục nào
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
