<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa Danh Mục - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-light">
<div class="d-flex">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}" th:with="activePage='categories'"></div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1">
                <i data-lucide="arrow-left" style="width:14px;height:14px"></i>
                Quay lại
            </a>
            <h4 class="mb-0 fw-bold d-flex align-items-center gap-2">
                <i data-lucide="pencil" style="width:20px;height:20px;color:#0d6efd"></i>
                Sửa Danh Mục
            </h4>
        </div>

        <div class="card shadow-sm border-0" style="max-width:500px;">
            <div class="card-body p-4">
                <form th:action="@{/admin/categories/edit/{id}(id=${category.id})}"
                      th:object="${category}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Tên danh mục <span class="text-danger">*</span>
                        </label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mô tả</label>
                        <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox"
                               th:field="*{visible}" id="visible">
                        <label class="form-check-label" for="visible">Hiển thị danh mục</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4 d-flex align-items-center gap-2">
                            <i data-lucide="save" style="width:15px;height:15px"></i>
                            Lưu
                        </button>
                        <a th:href="@{/admin/categories}" class="btn btn-outline-secondary px-4 d-flex align-items-center gap-2">
                            <i data-lucide="x" style="width:15px;height:15px"></i>
                            Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
