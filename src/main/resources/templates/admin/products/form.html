<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Sửa Sản Phẩm' : 'Thêm Sản Phẩm'">Form Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .preview-img { width:120px; height:120px; object-fit:cover; border-radius:10px; border:2px solid #dee2e6; }
        .extra-img   { width:80px;  height:80px;  object-fit:cover; border-radius:8px; border:2px solid #dee2e6; }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">

    <div th:replace="~{fragments/admin-sidebar :: sidebar}"
         th:with="activePage='products'"></div>

    <div class="flex-grow-1 p-4">
        <!-- Header -->
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/products}" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-1">
                <i data-lucide="arrow-left" style="width:14px;height:14px"></i>
                Quay lại
            </a>
            <h4 class="mb-0 fw-bold d-flex align-items-center gap-2">
                <i th:attr="data-lucide=${isEdit} ? 'pencil' : 'plus-circle'"
                   style="width:20px;height:20px;color:#0d6efd"></i>
                <span th:text="${isEdit} ? 'Sửa Sản Phẩm' : 'Thêm Sản Phẩm Mới'"></span>
            </h4>
        </div>

        <!-- ===== FORM XÓA ẢNH PHỤ (đặt NGOÀI form chính) ===== -->
        <div th:if="${isEdit}">
            <form th:each="img : ${product.images}"
                  th:id="'deleteImgForm_' + ${img.id}"
                  th:action="@{/admin/products/images/delete/{id}(id=${img.id})}"
                  method="post"
                  style="display:none">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="productId" th:value="${product.id}"/>
            </form>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <!-- ===== FORM CHÍNH ===== -->
                <form th:action="${isEdit} ? @{/admin/products/edit/{id}(id=${productDTO.id})} : @{/admin/products/add}"
                      th:object="${productDTO}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" th:field="*{currentThumbnail}"/>

                    <div class="row g-4">
                        <!-- Cột trái -->
                        <div class="col-md-8">
                            <!-- Tên sản phẩm -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Tên sản phẩm <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{name}"
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                       class="form-control" placeholder="Nhập tên sản phẩm">
                                <div class="invalid-feedback" th:errors="*{name}"></div>
                            </div>

                            <!-- Mô tả -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mô tả sản phẩm</label>
                                <textarea th:field="*{description}" class="form-control"
                                          rows="5" placeholder="Mô tả chi tiết sản phẩm..."></textarea>
                            </div>

                            <!-- Giá & Tồn kho -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Giá bán (₫) <span class="text-danger">*</span>
                                    </label>
                                    <input type="number" th:field="*{price}"
                                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                           class="form-control" min="0" step="any"
                                           placeholder="VD: 150000">
                                    <div class="invalid-feedback" th:errors="*{price}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Số lượng tồn kho <span class="text-danger">*</span>
                                    </label>
                                    <input type="number" th:field="*{stock}"
                                           th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'"
                                           class="form-control" min="0" placeholder="VD: 100">
                                    <div class="invalid-feedback" th:errors="*{stock}"></div>
                                </div>
                            </div>

                            <!-- Danh mục & Loại thú -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Danh mục <span class="text-danger">*</span>
                                    </label>
                                    <select th:field="*{categoryId}"
                                            th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid'"
                                            class="form-select">
                                        <option value="">-- Chọn danh mục --</option>
                                        <option th:each="cat : ${categories}"
                                                th:value="${cat.id}"
                                                th:text="${cat.name}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:errors="*{categoryId}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Loại thú cưng <span class="text-danger">*</span>
                                    </label>
                                    <select th:field="*{petType}"
                                            th:classappend="${#fields.hasErrors('petType')} ? 'is-invalid'"
                                            class="form-select">
                                        <option value="">-- Chọn loại --</option>
                                        <option th:each="type : ${petTypes}"
                                                th:value="${type}"
                                                th:text="${type.displayName}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:errors="*{petType}"></div>
                                </div>
                            </div>

                            <!-- Thương hiệu -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Thương hiệu</label>
                                <input type="text" th:field="*{brand}" class="form-control"
                                       placeholder="VD: Royal Canin, Pedigree...">
                            </div>
                        </div>

                        <!-- Cột phải - Upload ảnh -->
                        <div class="col-md-4">
                            <!-- Ảnh thumbnail -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Ảnh đại diện</label>

                                <img id="thumbnailPreview"
                                     th:src="${productDTO.currentThumbnail != null}
                                        ? @{'/uploads/products/' + ${productDTO.currentThumbnail}}
                                        : '/images/no-image.png'"
                                     class="preview-img d-block mb-2" alt="preview">

                                <input type="file" name="thumbnailFile" class="form-control"
                                       accept="image/*" onchange="previewImage(this, 'thumbnailPreview')">
                                <small class="text-muted">JPG, PNG, WEBP - Tối đa 5MB</small>
                            </div>

                            <!-- Ảnh phụ (chỉ hiện khi sửa) -->
                            <div th:if="${isEdit}" class="mb-3">
                                <label class="form-label fw-semibold">Ảnh phụ hiện tại</label>
                                <div class="d-flex flex-wrap gap-2 mb-2">
                                    <div th:each="img : ${product.images}"
                                         class="position-relative">
                                        <img th:src="@{'/uploads/products/' + ${img.imageUrl}}"
                                             class="extra-img" alt="ảnh phụ">
                                        <button type="button"
                                                th:onclick="'submitDeleteImg(' + ${img.id} + ')'"
                                                class="btn btn-danger btn-sm position-absolute top-0 end-0 d-flex align-items-center justify-content-center"
                                                style="padding:2px 4px; width:20px; height:20px;">
                                            <i data-lucide="x" style="width:11px;height:11px"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Upload ảnh phụ mới -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Thêm ảnh phụ</label>
                                <input type="file" name="imageFiles" class="form-control"
                                       accept="image/*" multiple>
                                <small class="text-muted">Chọn nhiều ảnh cùng lúc</small>
                            </div>
                        </div>
                    </div>

                    <!-- Nút submit -->
                    <hr>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-5 fw-semibold d-flex align-items-center gap-2">
                            <i th:attr="data-lucide=${isEdit} ? 'save' : 'plus'"
                               style="width:15px;height:15px"></i>
                            <span th:text="${isEdit} ? 'Lưu thay đổi' : 'Thêm sản phẩm'"></span>
                        </button>
                        <a th:href="@{/admin/products}" class="btn btn-outline-secondary px-4 d-flex align-items-center gap-2">
                            <i data-lucide="x" style="width:15px;height:15px"></i>
                            Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    lucide.createIcons();

    function previewImage(input, previewId) {
        const preview = document.getElementById(previewId);
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => preview.src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }

    function submitDeleteImg(imgId) {
        if (confirm('Xóa ảnh này?')) {
            document.getElementById('deleteImgForm_' + imgId).submit();
        }
    }
</script>
</body>
</html>
