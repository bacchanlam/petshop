<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .product-thumb { width:55px; height:55px; object-fit:cover; border-radius:8px; }
        .table td, .table th { vertical-align: middle; white-space: nowrap; }
        .col-name { white-space: normal !important; min-width: 200px; max-width: 350px; }
        .price-col { white-space: nowrap; }
        .action-col { white-space: nowrap; }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">

    <div th:replace="~{fragments/admin-sidebar :: sidebar}" th:with="activePage='products'"></div>

    <div class="flex-grow-1 p-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 fw-bold d-flex align-items-center gap-2">
                <i data-lucide="package" style="width:22px;height:22px;color:#0d6efd"></i>
                Quản Lý Sản Phẩm
            </h4>
            <a th:href="@{/admin/products/add}" class="btn btn-primary d-flex align-items-center gap-2">
                <i data-lucide="plus" style="width:16px;height:16px"></i>
                Thêm Sản Phẩm
            </a>
        </div>

        <!-- Thông báo -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show flash-alert d-flex align-items-center gap-2">
            <i data-lucide="check-circle-2" style="width:16px;height:16px;flex-shrink:0"></i>
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show flash-alert d-flex align-items-center gap-2">
            <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0"></i>
            <span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
        </div>

        <!-- Bộ lọc tìm kiếm -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form th:action="@{/admin/products}" method="get" class="row g-2 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label small fw-semibold">Tìm kiếm</label>
                        <input type="text" name="keyword" class="form-control"
                               placeholder="Tên sản phẩm..." th:value="${keyword}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Danh mục</label>
                        <select name="categoryId" class="form-select">
                            <option value="0">-- Tất cả --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${cat.id == categoryId}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
                            <i data-lucide="search" style="width:15px;height:15px"></i>
                            Tìm
                        </button>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/admin/products}" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
                            <i data-lucide="rotate-ccw" style="width:15px;height:15px"></i>
                            Reset
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Bảng sản phẩm -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span class="fw-semibold d-flex align-items-center gap-2">
                    <i data-lucide="list" style="width:16px;height:16px;color:#6c757d"></i>
                    Danh Sách Sản Phẩm
                </span>
                <span class="text-muted small">
                    Tổng: <strong th:text="${products.totalElements}">0</strong> sản phẩm
                </span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Danh mục</th>
                        <th>Giá</th>
                        <th>Tồn kho</th>
                        <th>Loại</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p, stat : ${products}">
                        <td class="text-muted small"
                            th:text="${currentPage * 10 + stat.index + 1}"></td>
                        <td>
                            <img th:if="${p.thumbnail != null}"
                                 th:src="@{'/uploads/products/' + ${p.thumbnail}}"
                                 class="product-thumb" alt="ảnh">
                            <img th:unless="${p.thumbnail != null}"
                                 src="/images/no-image.png"
                                 class="product-thumb" alt="no image">
                        </td>
                        <td class="col-name">
                            <span class="fw-semibold" th:text="${p.name}"></span>
                            <br>
                            <small class="text-muted" th:text="${p.brand ?: ''}"></small>
                        </td>
                        <td>
                            <span class="badge bg-light text-dark border"
                                  th:text="${p.category?.name ?: 'N/A'}"></span>
                        </td>
                        <td class="text-danger fw-semibold price-col">
                            <span th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                        </td>
                        <td>
                            <span th:classappend="${p.stock <= 5} ? 'text-danger fw-bold' : 'text-success'"
                                  th:text="${p.stock}"></span>
                        </td>
                        <td>
                            <span th:text="${p.petType.displayName}"
                                  class="badge bg-info text-dark"></span>
                        </td>
                        <td>
                            <span th:if="${p.active}"  class="badge bg-success">Đang bán</span>
                            <span th:unless="${p.active}" class="badge bg-secondary">Đã ẩn</span>
                        </td>
                        <td class="action-col">
                            <div class="d-flex gap-1 flex-nowrap">
                                <!-- Sửa -->
                                <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i data-lucide="pencil" style="width:14px;height:14px"></i>
                                </a>

                                <!-- Ẩn/Hiện -->
                                <form th:action="@{/admin/products/toggle/{id}(id=${p.id})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm"
                                            th:classappend="${p.active} ? 'btn-outline-warning' : 'btn-outline-success'"
                                            th:title="${p.active} ? 'Ẩn' : 'Hiện'">
                                        <i th:attr="data-lucide=${p.active} ? 'eye-off' : 'eye'"
                                           style="width:14px;height:14px"></i>
                                    </button>
                                </form>

                                <!-- Xóa -->
                                <button type="button" class="btn btn-sm btn-outline-danger"
                                        th:attr="data-form-id='deleteForm-' + ${p.id}, data-product-name=${p.name}"
                                        onclick="showDeleteModal(this)">
                                    <i data-lucide="trash-2" style="width:14px;height:14px"></i>
                                </button>
                                <form th:id="'deleteForm-' + ${p.id}"
                                      th:action="@{/admin/products/delete/{id}(id=${p.id})}"
                                      method="post" class="d-none">
                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${products.empty}">
                        <td colspan="9" class="text-center text-muted py-5">
                            Không tìm thấy sản phẩm nào
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Phân trang -->
            <div class="card-footer bg-white d-flex justify-content-center" th:if="${totalPages > 1}">
                <nav>
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId})}">
                                &laquo;
                            </a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            class="page-item" th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{/admin/products(page=${i}, keyword=${keyword}, categoryId=${categoryId})}"
                               th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId})}">
                                &raquo;
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<!-- Modal xác nhận xóa sản phẩm -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <div class="d-flex align-items-center gap-2">
                    <div class="rounded-circle bg-danger bg-opacity-10 p-2 d-flex align-items-center justify-content-center">
                        <i data-lucide="trash-2" style="width:20px;height:20px;color:#dc3545"></i>
                    </div>
                    <h5 class="modal-title fw-bold mb-0" id="confirmDeleteModalLabel">Xóa sản phẩm?</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-2 text-muted">
                Bạn có chắc muốn xóa sản phẩm <strong id="deleteProductName"></strong>? Hành động này không thể hoàn tác.
            </div>
            <div class="modal-footer border-0 pt-0 gap-2">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                    Hủy
                </button>
                <button type="button" class="btn btn-danger d-flex align-items-center gap-1" id="confirmDeleteBtn">
                    <i data-lucide="trash-2" style="width:15px;height:15px"></i>
                    Xóa
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    lucide.createIcons();
    document.querySelectorAll('.flash-alert').forEach(alert => {
        setTimeout(() => {
            alert.style.transition = 'opacity 0.5s, transform 0.5s';
            alert.style.opacity = '0';
            alert.style.transform = 'translateY(-10px)';
            setTimeout(() => alert.remove(), 500);
        }, 5000);
    });

    function showDeleteModal(btn) {
        const productName = btn.getAttribute('data-product-name');
        const formId      = btn.getAttribute('data-form-id');
        document.getElementById('deleteProductName').textContent = productName;
        document.getElementById('confirmDeleteBtn').onclick = function () {
            document.getElementById(formId).submit();
        };
        new bootstrap.Modal(document.getElementById('confirmDeleteModal')).show();
    }
</script>
</body>
</html>
